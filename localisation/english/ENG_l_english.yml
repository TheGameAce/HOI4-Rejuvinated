#Events
 rj_britain.1.t: "Motion of No Confidence"
 rj_britain.1.desc: "The parliament now discusses the removal of Neville Chamberlain from the post of prime minister due to a heated debate beginning a day prior about Chamberlain's leadership of the war."
 rj_britain.1.a: "Chamberlain Survives"
 rj_britain.1.b: "No Further Appeasement!"
 rj_britain.2.t: "Chamberlain's Successor"
 rj_britain.2.desc: "The parliament now has to decide who should take over."
 rj_britain.2.a: "Churchill"
 rj_britain.2.b: "Lord Halifax"
 rj_britain.3.t: "The Battle of Cable Street"
 rj_britain.3.desc: "Yesterday there was a series of clashes in East End of London between the Metropolitan Police and the British Union of Fascists militias, and Anti-Fascist demonstrators of the Independent Labour Party, the Communist Party of Great Britain and the Jewish People's Council."
 rj_britain.3.a: "Pass the Public Order Act 1936"
 rj_britain.3.b: "Leave it be..."
 rj_britain.4.t: "Omani Dominionship?"
 rj_britain.5.t: "[From.GetName] Asks for Non-Interference"
 rj_britain.5.d: "[From.GetNameDefCap] proposes a non-interference treaty, allowing us free reign on the continent, if we will only turn a blind eye to British activity in the region, as well as ignoring the Germans."
 rj_britain.5a.t: "[From.GetNameDefCap] Accepts Non-Interference"
 rj_britain.5a.d: "[From.GetAdjective] officials inform us that they have accepted our proposal of a non-interference treaty. They will turn a blind eye to our activities in Europe and with Germany, while we will leave them to their devices on the continent."
 rj_britain.5news.t: "Anglo-Italian Pact"
 rj_britain.5news.d: "The [ENG.GetAdjective] and [ITA.GetAdjective] governments have announced a pact of non-aggression and non-interference. Further stipulations include a clause indicating their intention to "respect the other's sphere of interest". Not all may be surprised to see this development after [ITA.GetNameDef]'s increasingly pro-[ENG.GetAdjective] rhetoric in recent months, but critics still warn of what this could mean for Europe."
 rj_britain.6.t: "The [ENG.GetAdjective] Propose an Alliance"
 rj_britain.6.d: "The [ENG.GetAdjective] have come to us in secret with a surprising proposal for an Anglo-Italian alliance. They suggest that, together, we could readily challenge any of the other world powers, even making the Germans a potential target. While this is very unexpected, it's not necessarily a bad idea, & it's worth some thought at minimum."
 rj_britain.7.t: "Conspire Against the Reich"
 rj_britain.7.d: "[From.GetNameDefCap] has contacted us with the request that we diplomatically isolate the Germans. They've indicated this would strengthen the possibility of some manner of alliance with us in the future."
 rj_britain.7a.t:1 "[From.GetName] Abandons [GER.GetName]"
 rj_britain.7a.d:1 "[From.GetNameDefCap] informs us that they have cut off diplomatic relations with [GER.GetNameDef]."
 rj_britain.7news.t: "[GER.GetAdjective] Diplomatic Isolation"
 rj_britain.7news.d: "Diplomatic relations between [GER.GetNameDef] and [ITA.GetNameDef] have taken a turn for the worse recently, with a string of minor diplomatic incidents being seized upon by the [ITA.GetAdjective] government to fuel hostile rhetoric. Though Italo-German relations had begun to improve in recent years, these new developments seem to effectively preclude any future cooperation between the two European powers.\n\nCritics point out the concurrent improvements in Anglo-Italian relations, as well as the 'convenience' this [GER.GetAdjective] diplomatic isolation provides to the British, which may indicate back room deals between the two nations."
 rj_britain.7b.t:1 "Italian-British Rapprochement"
 rj_britain.7b.d:1 "[From.GetNameDefCap] informs us that, on [ENG.GetAdjective] instigation, they have cut off diplomatic relations with us."
 rj_britain.7c.t:1 "[From.GetName] Supports [GER.GetName]"
 rj_britain.7c.d:1 "[From.GetNameDefCap] informs us that they have decided not to cut off diplomatic relations with [GER.GetNameDef]."
 rj_britain.8.t: "Our Old Rival"
 rj_britain.8.d: "While we've been seeking out compatible partners for alliance under our current government, it's come to our attention that we've overlooked the French. Historically they've been a rival to us, but in more recent years they've also shown to be capable of friendship with us as well. What shall we do in regards to them?"
 rj_britain.8a.t: "The British Propose an Alliance"
 rj_britain.8a.d: "The British have come to us with proposal of an alliance, citing the compatibilities between our two governments, as well as a desire to put aside old rivalries between our nations. This could be of benefit to us, but it could just as easily be some sort of British scheme. What should our response be?"
 rj_britain.8b.t: "The French Accept!"
 rj_britain.8b.d: "The French have accepted our proposal for alliance!"
 rj_britain.8c.t: "The French Reject!"
 rj_britain.8c.d: "The French have rejected our proposal for alliance!"
 rj_britain.8d.t: "The British Propose Non-Aggression"
 rj_britain.8d.d: "In an interesting turn of events, the British have come to us proposing a pact of non-aggression between our two nations. They state that since we have similar spheres of influence & similar interests, that it would benefit us both to simply respect one another's sovereignty, allowing both of us to go about our business as we please."
 rj_britain.8e.t: "The French Accept!"
 rj_britain.8e.d: "The French have signed the proposed non-aggression pact, bringing a lasting peace between our nations!"
 rj_britain.8f.t: "The French Reject!"
 rj_britain.8f.d: "The French have rejected our proposal for non-aggression. What fools!"
 rj_britain.9.t: "Plight of the Coal Miners"
 rj_britain.9.d: "The king has taken a special interest in the situation of the coal miners in Northumberland, wishing to get involved in resolving the problems he was witness to during a tour of the region some time back. What might his majesty do to help?"
 rj_britain.10.t: "The British Demand Hanover"
 rj_britain.10.d: "The British have come to us with a bold demand, insisting that Hanover is rightfully their territory, citing their historical personal union with the former kingdom. While this seems outrageous, there's some sentiments amongst the population there that are in favor of union with Britain. What shall our response be?"
 rj_britain.10a.t: "Our demands have been rejected!"
 rj_britain.10a.d: "We've had our demands for Hanover rejected out of hand! This is a grave insult, & we must take action to rectify it."
 rj_britain.10b.t: "Hanover is Ours!"
 rj_britain.10b.d: "Hanover is being turned over to us, with full cooperation from the population therein. All hail the king!"

