#Flags
 ENG_public_order_act_1936_flag: "Passed the Public Order Act 1936"

 RJ_ENG_more_funding_for_oxford: "More Funding for Oxford"
 RJ_ENG_more_funding_for_oxford_desc: ""
 RJ_ENG_armored_car_development: "Armored Car Development"
 RJ_ENG_armored_car_development_desc: ""
 RJ_ENG_reinforce_the_empire: "Fortify the Empire"
 RJ_ENG_reinforce_the_empire_desc: "To ensure the security of our overseas territories in this time of insecurity, we must put an emphasis on fortifying our colonial posessions."
 RJ_ENG_colonial_development: "Colonial Development"
 RJ_ENG_colonial_development_desc: "It's of the utmost importance that we utilize some of our resources to develop our colonial holdings."
 RJ_ENG_south_african_development: "South African Development"
 RJ_ENG_south_african_development_desc: "The political situation in South Africa is rather precarious. Many hold views that favor the Nazis of Germany, & oppose any involvement in the war. By investing in their economy & national development, we hope to win over some of the more stubborn elements of their political scene, while strengthening them for the possibility of war."
 RJ_ENG_improve_south_african_military_industry: "Improve South African Military Industry"
 RJ_ENG_improve_south_african_military_industry_desc: "In the case of war, South Africa ought to be prepared. In their current state, they suffer from political instability & a focus on mining industry, leaving their military capacity in a less than optimal state."
 RJ_ENG_transfer_control_of_local_administrations: "Transfer Control of Local Administrations"
 RJ_ENG_transfer_control_of_local_administrations_desc: "Transferring control of the local administrations, such as the Bechuanaland Protectorate, to the South African government, will free up more of our attention to handle our other colonial assets in Africa."
 RJ_ENG_canadian_development: "Canadian Development"
 RJ_ENG_canadian_development_desc: "The Canadians have been loyal & proven themselves time & again, including in the Great War. Providing them some developmental assistance will further strengthen relations with them, & help them along in their recovery from the depression."
 RJ_ENG_improve_canadian_military_industry: "Improve Canadian Military Industry"
 RJ_ENG_improve_canadian_military_industry_desc: "In the case of war, Canada ought to be prepared. Their military industrial capacity is woefully underwhelming & shall surely be inadequate for wartime."
 RJ_ENG_merge_newfoundland_and_labrador_with_canada: "Merge Newfoundland & Labrador with Canada"
 RJ_ENG_merge_newfoundland_and_labrador_with_canada_desc: "While Newfoundland & Labrador have become a dominion in more recent times, they have strong ties to Canada, & most of their population supports integration. We should give their people what they want, which is ultimately a union with Canada."
 RJ_ENG_new_zealand_development: "New Zealand Development"
 RJ_ENG_new_zealand_development_desc: "One of our smallest & most recent dominions is also one of the least developed. They could use our aid just as much as our larger, better established, dominions."
 RJ_ENG_improve_new_zealand_military_industry: "Improve New Zealand's Military Industry"
 RJ_ENG_improve_new_zealand_military_industry_desc: "New Zealand has nearly no military industrial capacity of it's own. It would be well worth our time to help them develop it so that they might have a chance of defending themselves in case of war."
 RJ_ENG_australian_development: "Australian Development"
 RJ_ENG_australian_development_desc: "Investing resources into better developing the Australian economy is a sound way of helping them to recover from the depression, while also strengthening a key territory in the Pacific."
 RJ_ENG_improve_australian_military_industry: "Improve Australian Military Industry"
 RJ_ENG_improve_australian_military_industry_desc: "Australians fought valiantly in the Battle of Gallipoli during the Great War. Unfortunately they suffered a great many casualties, which has led to anti-war sentiment amongst the population. By extension, this has also led to an underedevloped military industry, which we can help fix."
 RJ_ENG_malaysian_development: "Malaysian Development"
 RJ_ENG_malaysian_development_desc: "The British Straits settlements & Northern Borneo have largely been resource hubs for our empire, providing crucial materials to our industrial development. It's time we rectify this, & begin industrial development there."
 RJ_ENG_improve_malaysian_military_industry: "Improve Malaysian Military Industry"
 RJ_ENG_improve_malaysian_military_industry_desc: "With some newly developed industry for our key colony in SEA, we can now build up their completely lacking military industry, giving them appropriate means of arming themselves without relying on us so directly."
 RJ_ENG_development_of_the_raj: "Development of the Raj"
 RJ_ENG_development_of_the_raj_desc: "The state of the Raj is an unfortunately poor one, still being a highly agrarian society with any number of issues that hamper their development. At the very least, we can give them a bit of industrial investment to help them out."
 RJ_ENG_improve_the_raj_military_industry: "Improve the Raj's Military Industry"
 RJ_ENG_improve_the_raj_military_industry_desc: "Needless to say, with an underdeveloped & highly agrarian economy, the Raj's military industry is also extremely underdeveloped, being borderline nonexistent. It's time to rectify this."
 RJ_ENG_offer_omani_dominionship: "Offer Omani Dominionship"
 RJ_ENG_offer_omani_dominionship_desc: "Muscat & Oman has been under official protection of the Empire since 1891, with a friendship going back another century. We've taken care of both their military needs & their foreign policy for them. It's only right that we offer them the chance to officially join the Commonwealth as a dominion!"
 RJ_ENG_omani_development: "Omani Development"
 RJ_ENG_omani_development_desc: "The Omanis have greatly relied on us for more than a century. Unfortunately that hasn't changed, & the only way it looks like it will is by giving some industrial investment to their country, allowing them to stand on their own two feet."
 RJ_ENG_improve_omani_military_industry: "Improve Omani Military Industry"
 RJ_ENG_improve_omani_military_industry_desc: "As the Omani people have largely relied on us economically, so too have they relied on us militarily. Building up their military industry will allow them to establish their own armed forces more readily."
 RJ_ENG_colonial_conscription: "Colonial Conscription"
 RJ_ENG_colonial_conscription_desc: "The threat of war looms over our whole empire, even over our colonial territories. We must begin increasing conscription, including from overseas, to make ready for the inevitable."
 RJ_ENG_protect_ceylon: "Protect Ceylon"
 RJ_ENG_protect_ceylon_desc: "While out of the way of most potential threats, Ceylon is still a tempting target for any potential enemy, thanks to the rubber produced there. If, God forbid, Malaysia were to fall into enemy hands, then Ceylon would be our sole source of rubber!"
 RJ_ENG_conspire_against_the_reich: "Conspire Against the Reich"
 RJ_ENG_conspire_against_the_reich_desc: "The Italians have a shaky relationship with the Third Reich, seemingly out of necessity. Strategically, they might throw in with the Jerries, which would become a serious problem for us. We might be able to convince them of Germany's intent to betray them, keeping the two powers apart."
 RJ_ENG_the_anglo_italian_alliance: "The Anglo-Italian Alliance"
 RJ_ENG_the_anglo_italian_alliance_desc: "With the Germans out of the way diplomatically, we can now propose a proper alliance with the Italians. If we can work together, even the Germans will think twice about attacking us."
 RJ_ENG_our_old_rival: "Our Old Rival"
 RJ_ENG_our_old_rival_desc: "France has historically been a rival to us, competing for colonial territories & facing us in numerous wars. It's time to decide whether they remain a rival, or if they'll become a friend to us."
 RJ_ENG_noninterference_treaty_with_italy: "Non-Interference Treaty with Italy"
 RJ_ENG_noninterference_treaty_with_italy_desc: "Alliances aren't everything. Sometimes it's more beneficial to simply make a respectful peace treaty with another power, & let them tend to their own business while they let us tend to ours."
 RJ_ENG_subdue_the_wehrmacht: "Subdue the Wehrmacht"
 RJ_ENG_subdue_the_wehrmacht_desc: "The time has come to make our move against Germany. If we're to win, however, we must subdue the Wehrmacht!"
 RJ_ENG_reclaim_angevin_lands: "Reclaim Angevin Lands"
 RJ_ENG_reclaim_angevin_lands_desc: "Our ancestors once held imperial territories that are now a part of France, known as the Angevin Empire. We have a rightful claim to those lands, & shall make them our own once again!"
 RJ_ENG_integration_of_angevin_lands: "Integration of Angevin Lands"
 RJ_ENG_integration_of_angevin_lands_desc: "With the original territories of the Angevin Empire firmly under our control, we can now begin the integration process."
 RJ_ENG_power_over_parliament: "Power Over Parliament"
 RJ_ENG_power_over_parliament_desc: "Restoration of our parliamentary system as it once was under past monarchs is of vital importance! It will signal to the people that our king is of the people, & still desires to give them a say in the affairs of the government."
 RJ_ENG_demand_union_with_hanover: "Demand Union with Hanover"
 RJ_ENG_demand_union_with_hanover_desc: "Over a century ago, King George III restored British rule over the Kingdom of Hanover, forming a personal union with them. Decades later the union came to an end at the hands of Salian law, as Queen Victoria took the throne. We shall rectify this & demand the restoration of our rightful rule of the territory!"
 RJ_ENG_king_of_the_dominions: "King of the Dominions"
 RJ_ENG_king_of_the_dominions_desc: "His Royal Highness, King of the United Kingom, & the British Dominions..."
 RJ_ENG_emperor_of_india: "Emperor of India"
 RJ_ENG_emperor_of_india_desc: "...& Emperor of all India!"
 RJ_ENG_the_kings_command: "The King's Command"
 RJ_ENG_the_kings_command_desc: "It's been a tradition of the monarchy that the king act such as a warrior in the event of wartime, personally commanding our troops in battle. As war has fallen upon us once again, we shall continue with that tradition!"
 RJ_ENG_address_the_plight_of_the_coal_miners: "Address the Plight of the Coal Miners"
 RJ_ENG_address_the_plight_of_the_coal_miners_desc: "During a tour of the Northumberland Coal Fields a few years ago, the king noticed that many miners were out of work & poverty was becoming more widespread. Now that he's in a position to do something about it, he can address their plight!"
 RJ_ENG_in_service_of_the_king: "In Service of the King"
 RJ_ENG_in_service_of_the_king_desc: "Those of us called to war are in the service of the king. We must stand tall in the face of the enemy, as soldiers of the crown! Long live the empire, & long live the king!"
