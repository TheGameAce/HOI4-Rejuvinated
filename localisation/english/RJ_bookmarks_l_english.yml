l_english:
 rj_CUB_GATHERING_STORM_DESC: "Cuba has only been an independent nation for 34 years, & already in that time it has faced a great deal of corruption & hardship. Just 3 years ago, the Cuban Revolution saw the overthrow of Gerardo Machado, who had entrenched himself as a dictator. \n\nNow, this fledgling nation looks to the appointment of a new leader, as the shadow of the United States looms, & distant threats grow. \n\nWill it succumb to more corruption, triumph over it, or will it become a threat itself?"
 rj_BRA_GATHERING_STORM_DESC: "The Great Depression ruined the Brazilian economy due to over reliance on exports. The following years saw increasing levels of political upheaval as coalitions of military officers, workers & politicians overthrew the oligarchy that ruled the nation & replaced it with a fragile democratically-based constitution. \n\nGetúlio Vargas has come to the forefront of Brazilian politics in recent times, routing an attempted communist coup & assuming emergency powers. It remains to be seen whether democracy will be restored, or if Vargas will take the nation deep into authoritarianism."
 rj_USA_GATHERING_STORM_DESC: "The United States of America retreated into a deep isolation after the end of the Great War; the people felt enough American blood had been spilt. With economic prosperity on the rise through the Roaring Twenties, the American people became unconcerned about the affairs of nations across the world.\n\nBut now, as tensions rise & tempers flare across Europe & Asia, the people of this great nation may find themselves drawn into the fires of war, whether they want to or not."
