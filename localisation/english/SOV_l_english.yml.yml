 SOV_memel_disclusion_tt: "§H[188.getname]§! is not required, but will be cored."
 SOV_has_integrated_congress_poland_tt: "Has integrated §HCongress Poland§!"
 SOV_has_integrated_northern_manchuria_tt: "Has integrated §HNorth Manchuria§!"
#Flags
