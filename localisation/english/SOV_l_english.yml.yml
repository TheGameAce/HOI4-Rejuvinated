l_english:
#Political Parties
 SOV_kadets_party: "Kadets"
 SOV_kadets_party_long: "Constitutional Democratic Party"
 SOV_progressives_party: "Progressives"
 SOV_progressives_party_long: "National Russian Progressive Party"
#Characters
 SOV_viktor_chernov: "Viktor Chernov"
 SOV_pavel_milyukov: "Pavel Milyukov"
#Ideas
 SOV_new_republic_idea: "The New Republic"
 SOV_new_republic_idea_desc: "The old Russia is gone and the Republic has been revived! For the people!"
 SOV_multi_ethnic_federation: "Special Rights"
 SOV_multi_ethnic_federation_desc: "It is enshrined in our constitution that our country grants special rights to minority groups."
 SOV_nation_state: "One People"
 SOV_nation_state_desc: "We are one people. A Russian People."
 SOV_god_save_tsar_idea: "God Save the Tsar"
 SOV_god_save_tsar_idea_desc: "The people of [SOV.getnamedef] must put their full support behind the Tsar. God wills it!"
 SOV_constructor_of_democracies_idea: "Orchestrator of Democracies"
 SOV_constructor_of_democracies_idea_desc: "We shall establish new democratic states, under our guide and influence."
 SOV_greater_russian_dream_idea: "Greater Russian Dream"
 SOV_greater_russian_dream_idea_desc: "We must make our country big and great, even better than the good old days."
 SOV_alaska_payment_paying: "Paying for Alaska"
 SOV_alaska_payment_paying_desc: "We have now have Alaska back, but for a price."
 SOV_alaska_payment_recieving: "Recieving Payment for Alaska"
 SOV_alaska_payment_recieving_desc: "We have sold Alaska, and we are now being paid for it."
 SOV_increase_military_budget_spending: "Increased Military Spending"
 SOV_increase_military_budget_spending_desc: "With war on the horizon, we have redirected our budget to the military."
 SOV_return_of_capitalism_idea: "Russian Capitalism"
 SOV_return_of_capitalism_idea_desc: "Communism has destroyed our great country! Only capitalism can make Russia great again!"
 SOV_social_democracy_idea: "Russian Social Democracy"
 SOV_social_democracy_idea_desc: "Capitalism and Communism will cause harm to our country. But if we compromise, we can do great."
 SOV_better_working_idea: "Increased Working Conditions"
 SOV_better_working_idea_desc: "Increased working conditions can help increase the productivity of our workers."
 SOV_free_markets_idea: "Free Markets"
 SOV_free_markets_idea_desc: ""The freer the markets, the freer the people.""
 SOV_urban_idea: "Urbanization Efforts"
 SOV_urban_idea_desc: "We have made large efforts to bring people into the cities, to bring them together."
#Focuses
 SOV_reinstate_the_duma: "Reinstate the Duma"
 SOV_reinstate_the_duma_desc: "While the previous iterations of it massively failed, we should still give democratic institutions in the Duma a second chance!"
 SOV_hold_election: "Begin Elections"
 SOV_hold_election_desc: "Now that we have garnered enough support for democratic institutions, we must now reinstate democracy, and hold democratic elections so the people of Russia can decide the next government..."
 SOV_continue_the_monarchy: "Continue the Monarchy"
 SOV_continue_the_monarchy_desc: "The men that fought for the nation against the communist menace didn't fight for a republic, they fought for the monarchy. Therefore, it is best that the Tsar stays around."
 SOV_return_of_republic: "The Republic Returns"
 SOV_return_of_republic_desc: "Long gone are the days of one, absolute ruler.\nNo. We will re-establish the republican system of the past!"
 SOV_reforge_old_alliances: "Reforge Old Alliances"
 SOV_reforge_old_alliances_desc: "We worked together with the British during the Great War to stop the German Menace. Now, as it seems, the threat is still lingering, and we shall rekindle this alliance for the safety of the democracies."
 SOV_our_own_alliance: "Eastern Security Pact"
 SOV_our_own_alliance_desc: "With the threat of the Soviets now gone, the Eastern European nations certainly must feel a lot more safe. But who's to say that the Germans are to respect their independence?"
 SOV_union_of_sovereign_republics: "The Union of Sovereign Republics"
 SOV_union_of_sovereign_republics_desc: "We should keep our people united. Breaking up into many different states won't solve our problems, it will cause more. We need to reunite our nation into a new Union."
 SOV_dismantle_the_union: "Dismantle the Union"
 SOV_dismantle_the_union_desc: "How could we possibly manage so many peoples in one state? It is only right that we devolve into many semi-autonomous states, so our peoples can experience true liberation and freedom."
 SOV_closer_cooperation: "Closer Cooperation"
 SOV_closer_cooperation_desc: "Our alliance is not enough. No, we must seek closer cooperation with our allies, for greater benefits."
 SOV_expand_the_union: "Expand the Union"
 SOV_expand_the_union_desc: "We should grow our wonderful union, by inviting our allies to join us."
 SOV_god_save_the_tsar: "God Save the Tsar"
 SOV_god_save_the_tsar_desc: "The people of [SOV.getnamedef] must put their full support behind the Tsar. God wills it!"
 SOV_construct_new_democracies: "Orchestrator of Democracies"
 SOV_construct_new_democracies_desc: "We must establish ourselves as a democratic powerhouse, and prop up other democracies."
 SOV_reform_entente: "Reinvite Eastern Entente Members"
 SOV_reform_entente_desc: "Many of our former eastern friends from the Entente days seem rather lonely. Let us fix this."
 SOV_greater_russian_dream: "Greater Russian Dream"
 SOV_greater_russian_dream_desc: "We must make our country big and great, even better than the good old days."
 SOV_retake_poland: "Retake Poland"
 SOV_retake_poland_desc: "Poland has once again found itself a country, but this cannot last any longer. They are rightful lands of [ROOT.getnameDEF]!"
 SOV_retake_baltic: "Retake the Baltic States"
 SOV_retake_baltic_desc: "The Baltic States are weak and easy to manipulate. We must take them back, as they are our rightful lands and other governments may have similar plans..."
 SOV_retake_finland: "Retake Finland"
 SOV_retake_finland_desc: "Finland was once a Grand Duchy of us. However, during our first civil war, they have since broken away. We must amend this problem, and make them rejoin us, by force."
 SOV_retake_bessarabia: "The Bessarabia Problem"
 SOV_retake_bessarabia_desc: "Romania has made the mistake of unjustly stealing Bessarabia from us during our first civil war. We will make sure they regret that decision!"
 SOV_new_frontiers: "New Frontiers"
 SOV_new_frontiers_desc: "Our expansion waits for no-one! We shall go even further than we previously have. After all, who will stop us?"
 SOV_strike_east: "Strike East"
 SOV_strike_east_desc: "Mongolia and little Tannu Tuva stand weak at the moment. We should take our chance now to take then over! After all, we know what happens when they get too strong..."
 SOV_secure_bosporus: "Battle for the Bosphorus"
 SOV_secure_bosporus_desc: "We once wanted Constantinople after the Great War, but our dreams were shattered following our exit from the war. Today, [TUR.getnamedef] is not the strong empire that they once were. We should take this chance to take back what must be ours!"
 SOV_revenge_for_1905: "Revenge for 1905"
 SOV_revenge_for_1905_desc: "Japan, ever since the Russo-Japanese War, has been under the impression that they can mess with us. Ever since that war, we have lived in shame, but by fighting them once again, we can prove our might, and put Japan in the shade."
 SOV_reform_og_entente: "Reform the Entente"
 SOV_reform_og_entente_desc: "The Entente may have dissolved following the Great War, however we must have it back to counter growing threats from new empires..."
 SOV_alaska_refund: "The Alaska Refund"
 SOV_alaska_refund_desc: "Long ago, we sold Alaska to [USA.getnameDEF] during the Crimean War. However, that was a major mistake, and we shall have it back! We will be paying, of course."
 SOV_russia_first: "Russia First"
 SOV_russia_first_desc: "What need do we have to entangle ourselves in foreign alliances? Our past shows that they only cause trouble, and typically cause harm to our nation. We shall employ a realist, nationalist foreign policy rather than globalist ones."
 SOV_westward_intervention: "Westward Intervention"
 SOV_westward_intervention_desc: "Another Great War has broken out in Europe. We must choose how we shall intervene in it."
 SOV_eastern_intervention: "Eastern Intervention"
 SOV_eastern_intervention_desc: "Another Great War has broken out in Asia. We must choose how we shall intervene in it."
 SOV_increase_military_budget: "Increase Military Spending"
 SOV_increase_military_budget_desc: "With war already starting in other countries, we cannot be caught off guard. Currently, we are rather unprepared, so we must redirect much of our budget to the military."
 SOV_western_air_defenses: "Western Anti-Air Defenses"
 SOV_western_air_defenses_desc: "Our western industries would be at risk in an air war. We must ensure that they are protected, through proper anti-air weaponry."
 SOV_new_eastern_fleet: "New Far-Eastern Fleet"
 SOV_new_eastern_fleet_desc: "To prepare for a war in the Pacific, we cannot make the same mistakes that we did before. Therefore, we should build an entirely new fleet out in the Far East to battle that of the Japanese."
 SOV_greater_alliance: "Expand the Alliance"
 SOV_greater_alliance_desc: "It is well known that the Germans and Italians have ambitions for the Balkans and the Nordics. We shall ensure that they are protected, too."
 SOV_the_japanese_menace: "The Japanese Menace"
 SOV_the_japanese_menace_desc: "Japan has always been a threat to the balance of power in the East Asia region, and ever since 1904 we've had problems with them. Now, their ambitions have moved from petty imperialist wars to those of great evil. We must stop this immediately."
 SOV_the_revenge_for_brest_livotsk: "Revenge for Brest-Litovsk"
 SOV_the_revenge_for_brest_livotsk_desc: "Back in 1918, the Germans imposed the harsh treaty of Brest-Litovsk on us. Its only purpose was to fufill the their autocratic, imperialist ambitions. Now, Germany seems poised to strike yet again, but this time we will stop them first to prevent the mistakes of the Great War."
 SOV_russian_war_economy: "Russian War Economy"
 SOV_russian_war_economy_desc: "Now is not the time for peace. More than ever, the world is finding itself at war, and we must rightfully adjust our economy for it."
 SOV_destroy_the_duce: "Threat in the Mediterranian"
 SOV_destroy_the_duce_desc: "Italy has had its eyes on our southern Slavic and Orthodox brothers. We cannot let them continue to harrass them as they have, so we must strike them first."
 SOV_ally_with_real_china: "Ally the Real China"
 SOV_ally_with_real_china_desc: "Communist revolutionaries have sought to establish a socialist republic in China. We cannot let our true Chinese brothers fall to them as we have."
 SOV_internal_management: "Internal Management"
 SOV_internal_management_desc: "We should focus internally, so we can stabilize our country."
 SOV_fate_of_black_hundreds: "Fate of the Black Hundreds"
 SOV_fate_of_black_hundreds_desc: "While no doubt loyal to the Russian Nation, the Black Hundreds have done irreprable damage to our country by targeting minorities and liberal groups. Although they did help fight against the Bolshevik menace in the second Civil War, they will continue to be a hindrance in the new Russia unless dissolved."
 SOV_social_democracy: "Social Democracy"
 SOV_social_democracy_desc: "Not all of the ideas of the communists were bad. They supported many reforms to the workers that were much needed, and full capitalism would just be going back to the problems that we had in the past. Thankfully, we can compromise."
 SOV_capitalism: "Capitalism"
 SOV_capitalism_desc: "Socialists and communists alike have ruined our nation, and they have in many ways, but the economy is undoubtedly a sore thumb. If we are to return the glory to Russia, we shall return to the better system of economics as well."
 SOV_foreign_development: "Foreign Development"
 SOV_foreign_development_desc: "Our economic advisors have suggested that we seek investments from international companies. These investments can help boost our economy in both the civilian and military sectors."
 SOV_improve_workers_conditions: "Improve Working Conditions"
 SOV_improve_workers_conditions_desc: "It is only right that we increase factory conditions, they have not been too great, even after Soviet reforms..."
 SOV_free_the_markets: "Free the Markets"
 SOV_free_the_markets_desc: "The Soviet's overwhelming control over the economy led to our demise. If we want a fast growing economy, we should leave ourselves out of it."
 SOV_urbanization: "Urbanization Efforts"
 SOV_urbanization_desc: "Our country is extremely rural. Encouraging our people to move into the cities can allow for our economy to grow as we consolidate."
#Decisions
 SOV_security_pact_category: "Manage the Eastern Security Pact"
 SOV_security_pact_category_desc: "Several Eastern European states stand severely unprotected against the German Menace. Therefore, we shall save them."
 SOV_invite_country_to_security_pact: "Invite §H[FROM.getname]§! to [ROOT.getfactionname]"
 SOV_closer_cooperation_with_nation: "Begin Closer Cooperation with §H[FROM.getname]§!"
 SOV_integrate_nation: "Expand the §HUnion§! to §H[FROM.getnamedef]§!"
 SOV_big_russian_empire_category: "The Greater Russian Empire"
 SOV_big_russian_empire_category_desc: "Ever since the fall of the Russian Empire in 1917, our Russian nation has lost a major amount of land, glory, and prestige.\n\nNow with the monarchy back, we should no doubt re-create the empire from the good old days, but also make a new, better one. What's more, this time under the mandate of the people!\n\nHistorical integrations will cost only §H50§! political power, but non-historical integrations will cost §H100§! political power."
 SOV_establish_congress_poland: "Re-Establish Congress Poland"
 SOV_establish_congress_poland_desc: "Congress Poland was one of the many great lands that was under our relam. Now that we control it, we can reintegrate it."
 SOV_integrate_baltic: "Reintegrate the Baltic States"
 SOV_integrate_baltic_desc: "The Baltic States of Estonia, Latvia, and Lithuania were some of the many great lands that was under our relam. Now that we control them, we can reintegrate them."
 SOV_reestablish_grand_duchy: "Re-Establish the Grand Duchy of Finland"
 SOV_reestablish_grand_duchy_desc: "The Grand Duchy of Finland was one of the many great lands that was under our relam. Now that we control it, we can reintegrate it."
 SOV_integrate_bessarabia: "Reintegrate Bessarabia"
 SOV_integrate_bessarabia_desc: "Bessarabia was one of the many great lands that was under our relam. Now that we control it, we can reintegrate it."
 SOV_integrate_galicia: "Integrate Galacia into Congress Poland"
 SOV_integrate_galicia_desc: "Now that we have integrated Congress Poland, we shall expand their lands into Galicia, as well."
 SOV_integrate_east_prussia: "Integrate East Prussia into Congress Poland"
 SOV_integrate_east_prussia_desc: "Now that we have integrated Congress Poland, we shall expand their lands into East Prussia, as well."
 SOV_integrate_kurils_and_south_sakhalin: "Reintegrate the Kuril Islands and South Sakhalin"
 SOV_integrate_kurils_and_south_sakhalin_desc: "The Kuril Islands and South Sakhalin were some of the many great lands that was under our relam. Now that we control them, we can reintegrate them."
 SOV_integrate_bosporus: "Integrate the Bosphorus"
 SOV_integrate_bosporus_desc: "We once wanted Constantinople after the Great War, but our dreams were shattered following our exit from the war. However, that dream has now come to life as we control the region and can now integrate it."
 SOV_integrate_mongolia: "Integrate Mongolia"
 SOV_integrate_mongolia_desc: "Long ago, the Mongolians conquered us, being the only country to do so. However, now we have conquered them! We shall integrate them as a relam of our empire."
 SOV_integrate_north_manchuria: "Integrate North Manchuria"
 SOV_integrate_north_manchuria_desc: "The Russo-Japanese War may have left us humiliated and weakened. However times have changed and we now stand as the dominant power.\n\nAs a result, we control North Manchuria and we shall integrate them."
 SOV_integrate_south_manchuria: "Integrate South Manchuria"
 SOV_integrate_south_manchuria_desc: "The Russo-Japanese War may have left us humiliated and weakened. However times have changed and we now stand as the dominant power.\n\nAs a result, we control South Manchuria and we shall integrate them."
 SOV_integrate_mengjiang: "Integrate Mengjiang"
 SOV_integrate_mengjiang_desc: "The Russo-Japanese War may have left us humiliated and weakened. However times have changed and we now stand as the dominant power.\n\nAs a result, we control Mengjiang and we shall integrate them."
 SOV_integrate_korea: "Integrate Korea"
 SOV_integrate_korea_desc: "The Russo-Japanese War may have left us humiliated and weakened. However times have changed and we now stand as the dominant power.\n\nAs a result, we control Korea and we shall integrate them."
 SOV_integrate_hokkaido: "Integrate Hokkaido"
 SOV_integrate_hokkaido_desc: "The Russo-Japanese War may have left us humiliated and weakened. However times have changed and we now stand as the dominant power.\n\nAs a result, we control Hokkaido and we shall integrate them."
 SOV_reform_entente_category: "Reform the Entente"
 SOV_reform_entente_category_desc: "The Entente may have dissolved following the Great War, however we must need it back to counter growing threats from new empires..."
 SOV_reinvite_country_to_entente: "Reinvite §H[FROM.getname]§! to the Entente"
 SOV_reinvite_country_to_entente_desc: "[FROM.getnamedefcap] was once a key ally in the Entente. However, we have grown apart since its dissolution. It's time to get back together under the threat of expansionist powers."
 SOV_ask_for_leadership: "Ask §H[FROM.getname]§! if we can lead the faction instead"
 SOV_ask_for_leadership_desc: "The truth is, [ROOT.getfactionname] would be better off if we led it."
 SOV_invite_new_country_to_security_pact: "Invite §H[FROM.getname]§! to [ROOT.getfactionname]"
 SOV_invite_new_country_to_security_pact_desc: "We must expand our diplomatic reach to the Balkans and Nordics as well! Therefore, [FROM.getname] would be perfect for our alliance."
#Events
 rj_soviet.1.t: "The Duma Election, [GetMonth] of [GetYear]"
 rj_soviet.1.desc: "Several millions of Russian voters head to the polling sites to vote for the next Duma, which then votes for the Prime Minister. Who is declared winner?"
 rj_soviet.1.a: "The Trudoviks remain popular."
 rj_soviet.1.b: "The Progressives make a strong showing."
 rj_soviet.1.c: "The Kadets make their return."
 rj_soviet.2.t: "[SOV.getnamedefcap] Suggests Closer Cooperation"
 rj_soviet.2.desc: "Today the Russian ambassador has met with us, asking for even closer cooperation. This would see us surrendering some of our independence, but is is worth it for our security?"
 rj_soviet.2.a: "They do have a point..."
 rj_soviet.2.b: "Yeah, no."
 rj_soviet.3.t: "Request Denied"
 rj_soviet.3.desc: "The government of [FROM.getnamedefcap] has rejected our request, stating that they can sustain themselves on their own.\n\nHow should we respond?"
 rj_soviet.3.a: "A choice that we don't desire, but we respect."
 rj_soviet.3.b: "Let's see them fight independently, then!"
 rj_soviet.4.t: "[FROM.getnamedefcap] Accepts!"
 rj_soviet.4.desc: "The government of [FROM.getnamedefcap] has accepted our request and we have begun to more closely cooperate with them."
 rj_soviet.4.a: "Our future will be better, together."
 rj_soviet.5.t: "[FROM.getnamedefcap] Wants to Lead our Faction!"
 rj_soviet.5.desc: "Ambassadors from [FROM.getnamedef] have met us today, requesting that they lead our faction! How do we respond?"
 rj_soviet.5.a: "Maybe they're right, [FROM.getnamedef] would be a better leader."
 rj_soviet.5.d: "Sorry, right now isn't a good time."
 rj_soviet.6.t: "[FROM.getnamedefcap] Declines!"
 rj_soviet.6.desc: "[FROM.getnamedefcap] has decided that we should not be the new leader of [ROOT.getfactionname]."
 rj_soviet.6.a: "What a shame."
 rj_soviet.7.t: "[FROM.getnamedefcap] Accepts!"
 rj_soviet.7.desc: "[FROM.getnamedefcap] has decided that we shall lead [ROOT.getfactionname]!"
 rj_soviet.7.a: "They made the right choice - we shall lead [ROOT.getfactionname] to greatness!"
 rj_soviet.8.t: "The Alaska Refund"
 rj_soviet.8.desc: "Russian officials have met us today in [ROOT.capital.getname], requesting the refund of Alaska to them.\nOf course, it will come for a price, as they are willing to accept. How shall we respond?"
 rj_soviet.8.a: "Seems like a fair deal. Alaska isn't really worth much anyway."
 rj_soviet.8.b: "Funny suggestion! Get out."
 rj_soviet.9.t: "The Alaska Refund - Declined"
 rj_soviet.9.desc: "[FROM.getadjective] officials have decided on a response to our suggestion, seeing the suggestion as a joke and therefore declining it."
 rj_soviet.9.a: "That's unfortunate."
 rj_soviet.9.b: "Alaska will always be Russian in our hearts..."
 rj_soviet.10.t: "The Alaska Refund - Accepted"
 rj_soviet.10.desc: "[FROM.getadjective] officials have decided to respond positively to our suggestion, seeing the payments useful."
 rj_soviet.10.a: "Finally, Alyaska is back!"
 rj_soviet.11.t: "Fate of the Black Hundreds"
 rj_soviet.11.desc: "The Black Hundreds were a paramilitary force that, while loyal to the Tsar, also attacked minorities and those supportive of the democratic cause. Now that we have dissolved them, the question is what to do with those involved."
 rj_soviet.11.a: "They did help fight the commies, so we'll give them a pass this time."
 rj_soviet.11.b: "Their past actions will not be tolerated in the new Russia."
