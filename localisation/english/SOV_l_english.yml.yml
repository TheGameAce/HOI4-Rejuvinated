 SOV_faction_management_countries_effected_tt: "The countries that can be effected are:\n- @POL§H[POL.getnamedefcap]§!\n- @LAT§H[LAT.getnamedefcap]§!\n- @LIT§H[LIT.getnamedefcap]§!\n- @EST§H[EST.getnamedefcap]§!\n- @ROM§H[ROM.getnamedefcap]§!\n- @FIN§H[FIN.getnamedefcap]§!"
