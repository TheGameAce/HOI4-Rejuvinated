#Events
 ireland.1.t: "IRA Empowered"
 ireland.1.d: "With the IRA drawing closer to the state than they ever have before, they have started to undertake a small number of official duties alongside the Garda Síochána. We now enjoy close co-operation with them, and a great amount of loyalty."
 ireland.1.a: "Excellent"
 ireland.2.t: "IRA becomes loyal"
 ireland.2.d: "The IRA has become relatively close to the state, and has proven itself willing to co-operate with us on a number of minor issues. That being said, they are still somewhat reluctant to hand over complete authority to the state, and keep us at arms-reach."
 ireland.2.a: "Thats Good News"
 ireland.3.t: "IRA Appeased"
 ireland.3.d: "The IRA now views us as neither an enemy nor an ally, eyeing us up with suspicious, but not necessarily hostile eyes"
 ireland.3.a: "That's good news, I suppose"
 ireland.4.t: "IRA becomes disloyal"
 ireland.4.d: "Owing to a number of grievances with the state, the IRA has begun to swing against us, openly criticising our governmental policies, and calling for their members to provide some passive resistance to certain aspects of our government. Unless we rectify this situation soon, they may start openly turning against us."
 ireland.4.a: "Worrying"
 ireland.5.t: "IRA becomes hostile"
 ireland.5.d: "The IRA have now become openly hostile to us, calling for their members to actively resist the government. Worse still, we have heard rumours that they may be laying plans for some sort of coup. We must act fast if we wish to bring them back on side before it is too late..."
 ireland.5.a: "This is a crisis for [IRE.GetnameDef]"
 ireland.6.t: "The Irish Economic Advancement Act"
 ireland.6.d: "With the completion of the Econimic Advancement Act, we have everything prepared to set a priority for investment and advancement. The question remains therefore, what should benefit first?"
 ireland.6.a: "Focus on Industrial Construction Projects"
 ireland.6.b: "Focus on Industrial Research Projects"
 ireland.6.c: "Focus on improving the efficiency of our existing industry"
 ireland.6.e: "Focus on Electronic Research Projects"
 ireland.7.t: "The Agricultural Reform Drive"
 ireland.7.d: "We have prepared the state bureaucracy and governmental infrastructure to facilitate the goals laid out by the Agricultural Reform Drive. The question remains however, how much to we want to commit to this new project as a start-up investment"
 ireland.7.a: "Let's make a small investment to get started"
 ireland.7.b: "Make a substantial investment to fund future projects"
 ireland.7.c: "Make a huge investment to ensure all future projects have more than enough funding"
 ireland.8.t: "Industry for Ireland"
 ireland.8.d: "We have prepared the state bureaucracy and governmental infrastructure to facilitate the goals laid out by the Industry for Ireland project. The question remains however, how much we want to commit to this new project as a start investment" 
 ireland.9.t: "Saorstát Alcohol Factories"
 ireland.9.d: "Following the commencement of the IFI initiative, the Irish Department of Industry & Commerce have decided on perhaps a rather obvious choice to kick start Ireland's industry: alcohol. Ireland has a long and proud tradition of producing Irish whisky, but much of the production is done in small family-run distilleries throughout the countryside. The proposed Saorstát development will open up several alcohol factories and produce some much-needed employment for our nation, but the location for the development has yet to be decided, only that it should be in one of our less industrially developed regions."
 ireland.9.a: "Ulster. God knows, if anyone needs a drink, it's them."
 ireland.9.b: "Connacht. They need the jobs there."
 ireland.9.c: "Munster. They'll benefit the most from the profits."
 ireland.10.t: "The Pints Are Calling"
 ireland.10.d: "The construction of the Saorstát alcohol factories has finished, and now the nation can enjoy the benefits. The factories have not come without their expenses, but there's no doubt that they'll be good for public morale as well as the economy in the long-term."
 ireland.10.a: "Sláinte!"
 ireland.10.b: "This is getting far too expensive..."
 ireland.11.t: "The Coal-Cattle Pact"
 ireland.11.d: "An [IRE.GetAdjective] minister has appoached us to address the ongoing trade war between [ENG.GetnameDef] and [IRE.GetnameDef]. Though the conflict, which began in 1932 over constitutional changes and the land annuities due to us by the [IRE.GetAdjective], has not formally been resolved, changes in economic circumstances have been pushing us towards ironing out these past grievances. Indeed, right now, [IRE.GetAdjective] Farmers have been forced to slaughter their cattle simply because our tarriffs make their beef uneconomical for British consumers. At the same time, the growing industrialisation of [IRE.GetnameDef] has led to an increase in demand for coal - which we produce in spades, yet tarriffs are too high for our traders to competitively sell it in [IRE.GetnameDef]. By lowering tarriffs on these goods, we could finally begin to thaw this cold economic war we have been waging on one another to mutual benefit."
 ireland.11.a: "Sign the pact, let the trade flow!"
 ireland.11.b: "You think you're getting out of those repayments that easily?"
 ireland.12.t: "The Confirmation of Agreements Act"
 ireland.12.d: "[IRE.GetnameDef] officials have been closely working with our ministers over the past couple months to bring a conclusive end to the Anglo-Irish Trade War. Between them, they have drawn up the intuitavly named Confirmation of Agreements Act, which, if put into effect will bring an end to the trade war, and properly clarify, with the agreement of both nations, the status of Irish constitutional changes and the land annuities."
 ireland.12.a: "Let us put an end to this 'Economic War' for good."
 ireland.12.b: "Actually, we find these terms unacceptable"
 ireland.13.t: "End of the Anglo-Irish Trade War"
 ireland.13.d: "With the Confirmation of Agreements Act signed into being by the British Parliament, the Anglo-Irish Trade War has officially ended, and our trading companies are once more free to import and export goods across the Celtic Sea, with all tarriffs being lifted by both sides."
 ireland.13.a: "A Great Day for the Economy"
 ireland.14.t: "An opportune moment?"
 ireland.14.d: "The ongoing Abdication Crisis in [ENG.GetNameDef] has left the [ENG.GetAdjective] Monarchy particualy weak in Britain and elsewhere in the Empire. Within Ireland, the King has a representative within the Governor-General, who is able to weild a limited amount of influence over both our domestic and foreign policies. Naturally, as a prominent vestige of British authority and loyalty to the crown and commonwealth, the position is not well-liked by republicans and members of the Fianna Fáil in govenment.\n\n They have suggested that this crisis in the British Monarchy is the perfect opportunity we need to do away with un-Irish oaths of loyalty to the king, and the influence of the Governor-General, though more moderate politicians have already decried following such an action."
 ireland.14.a: "This shall be our first step towards a republic!"
 ireland.14.b: "It is not worth the effort."
 ireland.15.t: "Industrial Strategy"
 ireland.15.d: "As part of our heavy military industry plans, we are able to prioritise a certain area of armaments production in order to meet and facilitate our overall strategic goals. We can greatly increase our output in any given area for a period of time, however this will cost a considerable amount of our income so it should be done wisely, if at all."
 ireland.15.a: "Focus on producing tanks."
 ireland.15.b: "Our lads need more guns."
 ireland.15.c: "We need more planes in the sky."
 ireland.15.e: "There's no need for a priority right now."
 ireland.16.t: "[IRE.GetNameDef] Confirms ties to the Commonwealth"
 ireland.16.d: "The [IRE.GetAdjective] ambassador has approached us to officially confirm that following the electoral victory of the Fine Gael over the Fianna Fáil, [IRE.GetNameDef] has moved back towards allignment with the Commonwealth, and formally has joined us once more as a dominion."
 ireland.16.a: "Great News!"
 ireland.17.t: "[IRE.GetNameDef] Seeks to join the allies"
 ireland.17.d: "The [IRE.GetAdjective] Ambassador has appoached us with a formal request to join the allies an aid us in the fight to preseve global democracy"
 ireland.17.a: "Their assistance is most welcome!"
 ireland.17.b: "Sadly, we cannot accept this offer"
 ireland.18.t: "[ENG.GetNameDef] Sponsors our entry into the Allies"
 ireland.18.d: "The [ENG.GetAdjective] ambassador has approved our entry to the allies, praising our willingness to put our past grievances behind us."
 ireland.18.a: "We stand together"
 ireland.19.t: "[ENG.GetNameDef] refuses our entry to the Allies"
 ireland.19.d: "The [ENG.GetAdjective] representative has informed us that, though they appreciate the offer of support, they cannot sponsor our entry to the allies at the current time."
 ireland.19.a: "Disappointing"
 ireland.20.t: "[IRE.GetNameDef] seeks to join the Axis"
 ireland.20.d: "The [IRE.GetAdjective] representative has approached us requesting that they join the Axis, to aid our struggle against the British and the Bolsheviks"
 ireland.21.t: "[GER.GetNameDef] Sponsors our entry to the Axis"
 ireland.21.d: "The [GER.GetAdjective] representative has approved our entry to the Axis, and wishes us good fortune in our coming fight against the British"
 ireland.22.t: "[GER.GetNameDef] refuses our entry into the Axis"
 ireland.22.d: "The [GER.GetAdjective] representative has returned to us, declaring that, thought they appreciate the offer, they cannot allow our entry into the Axis at this time."
 ireland.23.t: "[IRE.GetNameDef] seeks to join the Comintern"
 ireland.23.d: "The [IRE.GetAdjective] representative has approached us requesting a formal invitation to the Comintern, so that they may join us in the international struggle"
 ireland.24.t: "[SOV.GetNameDef] Approves our entry into the Comintern"
 ireland.24.d: "The [SOV.GetAdjective] representative has returned to us, declaring that we shall be allowed entry to the Comintern forthwith, so that we may form a united front against the enemies of the revolution"
 ireland.25.t: "[SOV.GetNameDef] refuses our entry into the Comintern"
 ireland.25.d: "The [SOV.GetAdjective] representative has returned to us, saying that unfortunately, they cannot approve our entry into the Comintern at this time."
 ireland.26.t: "[IRE.GetNameDef] requests the transfer of Ulster"
 ireland.26.d: "We have been approached by representatives from [IRE.GetNameDef] requesting that we formally transfer Ulster to their control, stating that they have proved their loyalty to Britain and the Commonwealth, and would be in a better position to both defend, and invest in the territory than British forces and English- and Scottish- based companies. Though the six counties of Northern Ireland refused by plebicite to join the Irish Free State in 1921, the region is still considered by many to be Irish territory, and the [IRE.GetAdjective] government has promised, in the event of our agreement, to work with our official overseers to ensure that Ulster protestants and unionists recive proper respect, represtantation and treatment."
 ireland.26.a: "Their loyalty to us deserves a reward, transfer the territory and make Ireland whole!"
 ireland.26.b: "We cannot accept such an offer"
 ireland.27.t: "[ENG.GetNameDef] transfers Northern Ireland"
 ireland.27.d: "[ENG.GetAdjective] officials have responded to our request to transfer Northern Ireland positively, and have handed control of the territory over to us."
 ireland.27.a: "A Great day for [IRE.GetNameDef]!"
 ireland.28.t: "[ENG.GetNameDef] refuses to transfer Northern Ireland"
 ireland.28.d: "The [ENG.GetAdjective] representatives have repsonded to our request for Northern Ireland, stating that though they appreciate our loyalty to the commonwealth, they cannot freely hand over Northern Ireland to us, stating that the results of the 1922 plebicite must be respected.
 ireland.28.a: "Disappointing"
 ireland.29.t: "Unionists and Protestants challenge [IRE.GetnameDef]"
 ireland.29.d: "We should have seen it coming, but our acquisistion of Ulster has led to increased resistance from Ulster Protestants and Unionists, who have begun organising and alligning themselves with paramilitary groups like the Ulster Volunteer Force and the Orange Order. They have now begun an organised resistance against our occupation, seeking to either rejoin Britain, or independence from us."
 ireland.29.a: "This could be a problem"
 ireland.30.t: "The IRA launches S-Plan"
 ireland.30.d: "Our contacts in the IRA have informed us that they are launching a new operation against the British. As we understand it, this S-Plan, or sabotage Britain plan, will involve clandestine attacks on British installations in England, Scotland and Wales in order to weaken their war effort and aid a possible campaign in the north."
 ireland.30.a: "Hopefully nothing comes of this..."
 ireland.30.b: "Best of luck Boys!"
 ireland.31.t: "The IRA initiates S-Plan"
 ireland.31.d: "We have been informed by members of the [IRE.GetAdjective] government that the IRA have launched a new operation against us. Though the details are still unclear, we believe that this may involve sabotage of various targets throughout England, Scotland and Wales."
 ireland.31.a: "We must be on guard"
 ireland.33.t: "The IRA strikes British Infrastructure!"
 ireland.33.d: "The IRA have successfully sabotaged one of our railways, blowing up a section of track on an important industrial line. Fortunately, the fault was found before a train could pass, and no-one was hurt, but the perpetrators managed to escape."
 ireland.33.a: "Oh No!"
 ireland.33.b: "Put pressure on [IRE.GetNameDef] to move agaisnt the IRA"
 ireland.34.t: "The IRA strikes British Military Factories"
 ireland.34.d: "The IRA launched a daring attack on one of our military facories, initiating a shootout with local defence forces before rendering the production lines inoperable. Several officers and workers were injured and three have been confirmed dead."
 ireland.35.t: "The IRA strikes a British Civilian Factory"
 ireland.35.d: "In a heinous move, the IRA recently bombed one of our Civilian Factories, despite the fact that it contributes nothing to our armed forces. By infiltrating under the guise of a worker, the perpetrator was able to rig a portion of the factory to blow. Though they were later captured by law enforcement, the damage was done, with the factory rendered inoperable, and leaving tens of Civilian casualties in his wake."
 ireland.36.t: "The IRA strikes British Dockyards"
 ireland.36.d: "IRA assailants have succeeded in attacking one of our military dockyards. All perpatrators were killed in a shootout with the local constabulary, but not before serious damage was done to the naval installations in the area."
 ireland.37.t: "IRA plot to destroy infrastructure foiled"
 ireland.37.d: "IRA operatives have been apprehended laying an explosive device on rail lines near one of our industrial centres after the alarm was raised by a local engineer. Though we managed to outdo them this time, there is no telling where they could strike next."
 ireland.37.a: "Good job lads!"
 ireland.37.b: "We got lucky this time, but we should still put pressure on [IRE.GetNameDef] to ensure that it doesn't happen again."
 ireland.38.t: "IRA plot to destroy factory foiled"
 ireland.38.d: "Police forces have apprehended a number of individuals that we believe to be IRA operatives in a raid on a secluded rural dwelling. There, officers found plans and supplies for the destruction of a factory in a nearby industrial region. This time at least, we were one step ahead."
 ireland.39.t: "IRA plot to destroy dockyards foiled"
 ireland.39.d: "In a climatic shootout at one of our military dockyards, our military police have succeeded in killing IRA agents who were in the process of planting explosives to destroy our docks. The explosives were recovered, and the docks were thankfully unharmed, with only a handful of casualties."
 ireland.40.t: "[ENG.GetNameDef] demands we act against the IRA"
 ireland.40.d: "In response to recent sabotage efforts by the IRA on British soil, the [ENG.GetAdjective] ambassador has delivered to us an official request for the [IRE.GetAdjective] state to act against the IRA, and aid in the suppression of agents currently being sent from Ireland to Britain to sabotage military and civilian industrial targets. Obliging of course would damage our reletionship with the hard-line republicans, but refusal may damage our relations with Britain."
 ireland.40.a: "We are powerless to act against the IRA"
 ireland.40.b: "We will move against them then"
 ireland.40.c: "This cannot be tolerated. Increase patrols to put a stop to this S-Plan completely"
 ireland.42.t: "The IRA launch the Northern Campaign"
 ireland.42.d: "Our contacts within the IRA have informed us that they are now preparing for a major operation to sieze control of Northern Ireland."
 ireland.42.a: "Let's hope this doesn't escalate any further..."
 ireland.42.b: "Best of luck Boys!"
 ireland.43.t: "The IRA begin the Northern Campaign!"
 ireland.43.d: "A significant number of IRA forces have crossed the border into Northern Ireland, starting a border conflict with the intent of siezing control of Ulster for the republic!"
 ireland.43.a: "Terrible News!"
 ireland.43.b: "Request support from [IRE.GetNameDef] to sort things out on their side of the border."
 ireland.44.t: "Support from the Ulster Unionists Forms"
 ireland.44.d: "Following the IRA incusion into Northern Ireland, the Ulster Volunteer Force has mobilised to aid the Royal Irish Constabulary in repelling the IRA and ensure that Ulster remains seperate from [IRE.GetnameDef]"
 ireland.44.a: "Good news at last."
 ireland.45.t: "Britain demands support against the IRA in Northern Ireland"
 ireland.45.d: "British respesentatives from Northern Ireland have approached us requesting we send Gardai units to the border to help secure it against IRA aggression. Though this would damage our relationship with the IRA, refusing to move against them would make us complicit in this clear attack on British territory, and could put our relationship with Britain and their allies in serious risk."
 ireland.45.a: "Send aid to the Border - The IRA shall not drag us into a war!"
 ireland.45.b: "We are unable to help at this time."
 ireland.46.t: "[IRE.GetNameDef] responds that they are unwilling to move against the IRA"
 ireland.46.d: "The [IRE.GetAdjective] representatives have returned to us, saying that the [IRE.GetAdjective] government is currently unable to move against the IRA and suppress the S-Plan saboteurs. Whether they lack the means, will, or desire to move against them remains unclear."
 ireland.46.a: "Damn them!"
 ireland.47.t: "[IRE.GetnameDef] responds that they have moved against the IRA"
 ireland.47.d: "The [IRE.GetAdjective] representatives have returned, bearing news that the [IRE.GetAdjective] government has launched a crackdown against the IRA, and is closely policing traffic due to Britain from Irish ports. This should prevent IRA saboteurs from being able to wreak havoc in Britain for some time."
 ireland.47.a: "Good"
 ireland.48.t: "[IRE.GetNameDef] responds that they are cracking down on the IRA"
 ireland.48.d: "The [IRE.GetAdjective] representatives have returned, bearing newsw that that [IRE.GetAdjective] government has begun a major crackdown on IRA smuggling operations in Irish ports. This should finally put a stop to the saboteurs."
 ireland.48.a: "Great!"
 ireland.49.t: "[IRE.GetNameDef] sends assistance to Northern Ireland"
 ireland.49.d: "The [IRE.GetAdjective] representatives have returned to us promising that several units of the Garda Síochána to aid us in combating the IRA insurgents who are waging an illegal war across the Northern Irish Border"
 ireland.49.a: "We send our thanks"
 ireland.50.t: "[IRE.GetNameDef] refuses to send assistance to Northern Ireland"
 ireland.50.d: "The [IRE.GetAdjective] representative has returned to us expressing that, regretfully, [IRE.GetNameDef] is currently unable to assist us against the IRA attacking us illegally in Northern Ireland. A disappointing result to say the least, some within the Ulster, and even London government are suggesting that the Irish inaction over the northern campaign is tantamount to an official approval, claiming that the [IRE.GetAdjective] government is complicit in the whole affair, despite the supposed peace between our nations."
 ireland.50.a: "Damn them!"
 ireland.50.b: "If they are not with us, then they must obviously be against us..."
 ireland.52.t: "The IRA grows closer to the state"
 ireland.52.d: "We have recently noticed a significant increase in pro-government feelings rising amongst the ranks of the IRA, with increased desire to co-operate with the government in establishing a republic free of British influence"
 ireland.52.a: "Good to hear!"
 ireland.53.t: "IRA growing impatient with the state"
 ireland.53.d: "We have noticed that the IRA is becoming increasingly critical of the state, feeling that constitutional change is moving too slow, and we are not doing enough to bring Ulster into [IRE.GetNameDef]."
 ireland.53.a: "Worrying..."
 ireland.54.t: "IRA recruitment drive"
 ireland.54.d: "The IRA have begun a major recuritment drive, greatly increasing their numbers of both active soldiers and supporting agents."
 ireland.54.a: "Disconcerting..."
 ireland.55.t: "IRA losing popular support"
 ireland.55.d: "We have noticed that public support for the work of the IRA seems to be in decline, with more moderate views prevailing, and an increased feeling of unease about the more extreme and militant actions undertaken by the IRA. As a result, the organisation has been significantly weakened."
 ireland.55.a: "That soulds like good news..."
 ireland.56.t: "Patriots flock to the IRA"
 ireland.56.d: "The IRA have undertaken a large recruitment drive by appealing to more moderate views. This has had the dual effect of increasing their strength, but also limiting the influence of more radical ideologies within the organisation, making it more receptive to co-operation with the state"
 ireland.56.a: "Well, as long as they remain loyal..."
 ireland.57.t: "Moderates desert the IRA"
 ireland.57.d: "We have noticed that the IRA has been suffering with increased levels of desersion recently, with more moderate individuals growing dissillusioned with the radical views of the IRA leadership. This has weakened the IRA somewhat, but has also made it more disloyal, as radicals now hold a greater share in its leadership."
 ireland.57.a: "Well, so long as they remain weakened..."
 ireland.58.t: "IRA has a crisis in leadership"
 ireland.58.d: "A recent disagreement within IRA leadership has led into a full-blown schism within its high command. As a result, many disillusioned members have left the organisation, and those that remain now feel themselves too weak to operate completely independently of the state."
 ireland.58.a: "Great!"
 ireland.59.t: "Dissidents flock to the IRA"
 ireland.59.d: "The IRA has begun a large recruitment drive among various opposition groups both inside and outside of mainstream politics. Attracting both radical and moderate opponents of the government alike, the organisation has both grown stronger, and become more assertive in its opposition to the state."
 ireland.59.a: "Not good..."
 ireland.60.t: "[ENG.GetNameDef] accepts the Coal-Cattle Pact"
 ireland.60.d: "Our negotiators have returned to Dublin successful, as their [ENG.GetAdjective] counterparts have agreed to the Coal-Cattle Pact, paving the way for us to begin lowering tarriffs, and weaken the negative effects of the Economic War"
 ireland.60.a: "Great!"
 ireland.61.t: "[ENG.GetNameDef] refuses the Coal-Cattle Pact"
 ireland.61.d: "Our negotiators have returned to Dublin empty-handed, with negotiatons for the Coal-Cattle pact breaking down amid continued demands from the Westminster government to pay the land annuities in full."
 ireland.61.a: "What do we do now?"
 ireland.62.t: "[ENG.GetAdjective] refuses the Confirmation of Agreements Act"
 ireland.62.d: "Negotiatons in Westminster have broken down, following the [ENG.GetAdjective] Parliament rejecting the terms of the act in its final review. We will now have to attempt another course of action if we want to end the Economic War."
 ireland.62.a: "What now then?"
 ireland.63.t: "Ulster Protestants challenge [IRE.GetNameDef]"
 ireland.63.d: "Angered by the privilege we have granted to the Catholic church, and its influence within the state, Protestants in Ulster have begun to organise into cells to resist changes that have been occuring with our occupation of the region."
 ireland.63.a: "Concerning..."
 ireland.64.t: "Losing control of Northern Ireland!"
 ireland.64.d: "Despite the efforts of the Royal Ulster Constabulary, the continued attacks by the IRA have been slowly weakening our control over Northern Ireland. If we do not act soon, we are in danger of losing control of the region!"
 ireland.64.a: "We must act"
 ireland.65.t: "IRA sieze control of Northern Ireland!"
 ireland.65.d: "The continued pressure of the IRA in Northern Ireland has exhausted the local defence forces, who have now been forced to yeild to their unrelenting attacks. With the IRA in control of the state, they have moved to hand it over to [IRE.GetNameDef], who have reluctantly accepted ownership. As politicians in Westminster point fingers and now-exiled members of the Ulster Volunteer Forces and the Royal Irish Constabulary come to terms with their defeat, we can only sit back and wonder what to do next."
 ireland.65.a: "Sadly, there is nothing we can do..."
 ireland.65.b: "We shall return!"
 ireland.66.t: "The IRA hands Northern Ireland over to us"
 ireland.66.d: "Having ousted British and Unionist defenders in Northern Ireland, the IRA have gained near complete control of the region. Having no governmental capacity in themselves, they have handed over control of the area to us to administer - whether we want it or not. Though this has reunified the island under our control, it will no doubt ruin our relationship with Britain, and could potentially even bring us to war against them. It is also quite possible that once the IRA leave the region, Unionists and Protestants may begin to organise their own resistance once more. It has also had the effect of greatly bolstering the IRA's strength, making them an even stronger and more influential force in Irish politics."
 ireland.66.a: "Lets hope that this does not blow up in our face..."
 ireland.67.t: "[IRE.GetNameDef] illegally siezes treaty ports!"
 ireland.67.d: "We have recieved disturbing news that, completely unprovoked, [IRE.GetAdjective] soldiers entered ports that, in accordance with the 1921 Anglo-Irish treaty, were leased to the Royal Navy for docking and resupply. Thereafter, they blockaded entry to the ports, and declared them sovreign territory of [IRE.GetNameDef], barring entry of any British-flagged vessel. Though this stands as a slight against our authority, and shows no regard for the standing treaties between our two nations, there is relatively little we can do save for military action, an option that is not exactly popular among the British public right now."
 ireland.67.a: "Fait accompli, we care not enough for those ports."
 ireland.67.b: "This is a slight against us! We demand satisfaction!"
 ireland.68.t: "The IRA are preparing a coup!"
 ireland.68.d: "Our agents within the IRA have confirmed the dire news to us that the IRA have in fact, put plans into motion to overthrow our government by force. They are already moving men and weapons into position to launch their attack, and the general feelings among their members is that there is no going back now. A revolt is now inevitable. We can only hope that we are properly prepared for when they strike."
 ireland.68.a: "The Die is Cast..."
 ireland.69.t: "The IRA Revolts!"
 ireland.69.d: "The IRA has issued an immediate ultimatum to us, demanding that we with all due urgency, relinquish our control of Ireland to them, so that they can 'properly lead Ireland towards a republic'. We, naturally, have offered a stern rebuke, and have told them that if they want Ireland for themselves, they'll have to come and take it."
 ireland.69.a: "The Civil War begins anew..."
 ireland.70.t: "Eoin O'Duffy grows close to the IRA"
 ireland.70.d: "Formerly one of the largest critics of the IRA, we have notice the Eoin O'Duffy has grown increasinly close to the IRA. Though ordinarily we would say that each man has the right to form his own political opinions and connections, O'Duffy is not only a prominent man within the National Army, but is also the leader of the National Corporate party, which has its own paramilitary branch in the Greenshirts. Should those two forces unite, both would gain a significant amount of strength and infuence over Irish politics"
 ireland.70.a: "We cannot allow such an alliance to form"
 ireland.70.b: "Mr. O'Duffy can befriend who he pleases"
 ireland.71.t: "IRA Defeated!"
 ireland.71.d: "We have finally fully defeated the IRA insurgents who rose up against us. With the last of the IRA cells being rounded up and arrested, the Irish Republican Army is no more. Both Ireland and its armed forces are now united once more, and we can now push forward without fear of insurgents threatening Irish democracy."
 ireland.71.a: "A Great day for our nation!"
 ireland.72.t: "Democratic opposition forming a resistance!"
 ireland.72.d: "After we seized control of the Irish government in Dublin, we thought that we had completely crushed the opposition that were leading the Irish republic into the ground, but it seems that some politicians managed to escape, and are now rallying parts of the National Army not yet loyal to the new order against us!"
 ireland.72.a: "If they want a fight, they'll get one!"
 ireland.73.t: "Democratic opposition launch a revolt!"
 ireland.73.d: "Politicians ousted from Dublin have rallied against us, convincing a significant portion of the National Army to turn against us. they have now declared a full-scale war to reclaim Ireland. We must act fast to put down this insurrection, or before long they will have us on a British leash once more!"
 ireland.73.a: "Death to traitors!"
 ireland.74.t: "Democratic Opposition Defeated!"
 ireland.74.d: "The former Dublin politicians who dared to rally disloyal parts of teh National Army have finally been defeated, uniting the Irish state fully under our banner. Now we can at last, get on with building the Free Ireland the Irish people deserve"
 ireland.74.a: "A Great Day for our nation!"
 ireland.76.t: "Losing Control of Northern Ireland!"
 ireland.76.d: "Despite our efforts, the continued attacks of Unionists and protestant insurgents against our forces in Northern Ireland have slowly and steadily weakened our grasp over the region. If we do not act fast, we could quickly find ourselves facing a full-scale revolt!"
 ireland.76.a: "We must act quickly!"
 ireland.77.t: "Unionists Rise in Northern Ireland!"
 ireland.77.d: "Continued pressure from Unionists has come to a head, with the reformed Ulster Volunteer Force and Orange Order insurgents launching a full rebellion against us. With swift action, they have recaimed control of much of the six counties, overrunning local defence forces. If we are to move against them now, we must move fast, for the international community have no doubt already taken notice. Alternatively, though it would bring great shame to us, we could admit fait accompli, and relinquish control of Ulster, to prevent the rebels moving southwards."
 ireland.77.a: "Ireland shall remain whole!"
 ireland.77.b: "Alas, we cannot afford further bloodshed..."
 ireland.78.t: "The Unionist Rebels"
 ireland.78.d: "The ongoing rebellion in Northern Ireland is of great interest to us, with the rebels openly declaring their support for our ownership of Northern Ireland over the [IRE.GetNameDef]. Much of the national media and a not insignificant number of politicans have declared their support for intevening to save the rebels, who are our natural allies, but can we really afford another war in Ireland?"
 ireland.78.a: "We have a duty to protect the Unionists of Ulster!"
 ireland.78.b: "Send Ireland an ultimatum to cease hostilities"
 ireland.78.c: "The Ulster Unionists are on their own."
 ireland.79.t: "The [ENG.GetAdjective] ultimatum"
 ireland.79.d: "The [ENG.GetAdjective] represtantative has come forward to us with an ultimatum: immediately cease hostilities with the Unionists of Northern Ireland, or Britain will consider military intervention. Needless to say, there are mixed feelings about renewed war with Britain. Some, particularly in IRA circles would relish the opportunity to fight Britain, and defend our rights to Ulster, however others are worried that the situation could cascade rapidly out of control, precipitating a far larger conflict that we may not be ready for. There are however also a select few that believe that the ultimatum is merely a bluff - if the British wanted war, surely they would have acted already?"
 ireland.79.a: "We cannot risk war with Britain"
 ireland.79.b: "Ireland must be unified, no matter what Westminster thinks!"
 ireland.80.t: "Ireland agrees to make peace"
 ireland.80.d: "Responding to our ultimatum to make peace with the Ulster Unionists, the Irish ambassador has confirmed that [IRE.GetNameDef] has folded to our demands, and hostilities have ceased immediately. Northern Ireland now effectively exists as an independent state"
 ireland.80.a: "Excellent"
 ireland.81.t: "Ireland refuses to make peace"
 ireland.81.d: "The Irish ambassador has rebuffed our ultimatum demanding [IRE.GetNameDef] make peace with the Ulster rebels, stating that Ireland must be made whole. We now must make the decision on if we intend to follow through with our threats and declare war on [IRE.GetNameDef], or to let the issue slide."
 ireland.81.a: "We have no other option, to War!"
 ireland.81.b: "Actually, we can't afford another war right now..." 
 ireland.82.t: "Choosing an Irish King"
 ireland.82.d: "If we are have an Irish king worthy of international respect, it simply must be someone who can demonstrate a respectable lineage to a noble of royal house. Among the dispora of old Irish artistocracy, two names keep coming up as possible candidates: First, Jorge Maria O'Neill, the young head of the O'Neills of Clandeboye, who holds descent from the O'Neill clan, and the legendary high king Niall Noígíallach. Second, Leopoldo O'Donnel, currently titled as the Duke of Tetuán in Spain, who is the head of the O'Donnell clan, who were once Earls of Tyrconnel. To whom should we offer the crown?"
 ireland.82.a: "It could only be an O'Neill!"
 ireland.82.b: "Leopoldo O'Donnell is no stranger to politics."
 ireland.83.t: "The position of the Church in the new monarchy"
 ireland.83.d: "Many within the Monarchist movement feel that the ascent of a king to the independent throne of Ireland should be accompanied by the rising empowerment of the Catholic church in Ireland, and are requesting that it's rights be properly enshrined within the constitution establishing the new monarchy."
 ireland.83.a: "Ireland shall be a Catholic State"
 ireland.83.b: "Actually, we'd prefer to keep the church at arms' reach"
 ireland.84.t: "The position of the Church in the new monarchy"
 ireland.84.d: "Many within the Monarchist movement feel that the ascent of a king to the independent throne of Ireland should be accompanied by the rising empowerment of the Catholic church in Ireland, and are requesting that it's rights be properly enshrined within the constitution establishing the new monarchy. It however has not escaped notice that our new king will not themselves be a catholic, and as such, enforcing such a thing into the consitution could lead to future troubles. That being said however, Ireland is still a predominantly catholic nation, and expects, if the monarchy is to succeed, for it to respect the role of the church."
 ireland.84.a: "Ireland shall be a catholic nation, regardless of its new king."
 ireland.84.b: "It would be best if we did not commit such things to writing at this time."
 ireland.85.t: "Between the Church and the King"
 ireland.85.d: "There has been a growing divide between the king, and high-ranking members of the catholic clergy. The king, keen to retain his own protestant views, has refused to observe catholic rites in his personal worship, appointing a prorestant priest to his royal chaplaincy. The clergy however, pointing to the rights they have been granted within the constitution, are demanding that these changes be reversed, so that they have greater access to the king, and control of the royal chaplaincy to ensure catholic practises are observed at all formal occasions. With both parties now trying to put pressure on the government to get their way, we are forced to take some kind of action."
 ireland.85.a: "Force the King to accept Catholic rites"
 ireland.85.b: "Compromise on religion with the King"
 ireland.85.c: "Suppress the issue as best we can"
 ireland.86.t: "[IRE.GetLeader] becomes more Irish"
 ireland.86.d: "Having now been in Ireland for some time, [IRE.GetLeader] has adapted slowly to Irish culture and manners, and is now widely considered to be well-integrated into Ireland and Irish culture"
 ireland.86.a: "Good to hear!"
 ireland.87.t: "[IRE.GetLeader] adapting to Irish Norms"
 ireland.87.d: "Though he previously had little knowledge of Irish ways and culture, [IRE.GetLeader] has slowly been adapting to our customs and ways. Though there is clearly some way still yet to go, [IRE.GetLeader] has improved his knowledge of English significantly, being able to communicate effectively with his subjects, and has begun attempting to learn Gaelic as well. There is of course, still some way to go before he can be considered properly Irish, but his progress has been noted nonetheless."
 ireland.88.t: "[IRE.GetLeader] becomes more Irish"
 ireland.88.d: "Having now been in Ireland for some time, [IRE.GetLeader] has adapted slowly to Irish culture and manners, and is now widely considered to be well-integrated into Ireland and Irish culture"
 ireland.89.t: "Ireland begins a campaign of monarchist agitation"
 ireland.89.d: "With a Prince of Prussia empowered in Ireland, the house of Hohenzrollern has been more active in German politics once more, seeking to create sympathy and support for a restoration. Until now, their attempts were of little concern to us, but we have noticed that they have kicked up their efforts significantly, starting a new, extensive propaganda campaign."
 ireland.89.a: "Troublesome..."
 ireland.90.t: "Irish-Backed monarchists ignite a Civil War!"
 ireland.90.d: "Recieving a significant amount of foreign aid and promises for military support, monarchist supporters have attempted a military coup against us, attempting to sieze the halls of government just as they had done in Dublin when the monarchists took charge there. Our forces however, were prepared for such an attempt, and successfully defended the heart of the Reich from the traitors. Unfortunately however, we were unable to apprehend all of the perpetrators, and they have now fled to the west to continue the fight, taking a significant portion of the military with them."
 ireland.90.a: "Death to Traitors!"
 ireland.91.t: "[IRE.GetnameDef] moves to fuse the kingdoms"
 ireland.91.d: "The Irish representatives have journeyed to Westminster to begin negotiations to unite the Dual Monarchy into a single, unified state. We have the opportunity to aid them along their way, and unify the kingdoms together."
 ireland.91.a: "Where there were two, there shall be one."
 ireland.91.b: "let the Irish continue their work"
 ireland.92.t: "Francis Stuart adapts to politics"
 ireland.92.d: "The architect of the monarchist takeover of Ireland, Francis Stuart has grown increasingly familiar with the duties of government, leaving behind his early inexperience and naivety as the leader of the monarchist society, forming a proper alliance with the previously sidelined Sinn Féin party, whose past ideas he has drawn so heavily upon, and becoming a proper leader for Ireland."
 ireland.92.a: "Good"
 ireland.93.t: "The King's Representative?"
 ireland.93.d: "With the Estabishment of the dual monarchy, the king takes his place as the head of state. Naturally however, living in Britain, the King isn't present to preside over the day-to-day running of [IRE.GetNameDef], and thus must have a representative to rule in his stead. The question is of course, who should his representative be? The Obvious Choice is Francis Stuart, the man who led Ireland into the dual monarchy, but some others have suggested that John Maffey, Baron Rugby, who has been serving as the British representative to Ireland would make a better choice. Though not born an Irishman, Maffey has played a key role in Anglo-Irish relations, an important go-between for Dublin and Westminster, and, perhaps most importantly, a key figure in promoting the equality between Britain and Ireland."
 ireland.93.a: "Stuart should remain at the head of the Monarchist Cause"
 ireland.93.b: "Maffey seems to have a way with politics..."
 ireland.94.t: "[IRE.GetnameDef] seeks to establish a dual monarchy"
 ireland.94.d: "it has come to our attention that [IRE.GetNameDef] has been moving to rejoin us under the provison that our nations be joined in a dual-monarchy, reminicient of the old Austro-Hungarian Empire.\n\n Under this establishment, Ireland would be tied to Britain once more, with the King as its head of state, but the Westminster government would have no say or influence over Irish politics. Whilst some have welcomed the idea of returning Ireland to our rule, at least in part, others have been less eager, worrying about the impact it would have on British politics should the King be empowered further"
 ireland.94.a: "We support this idea. Peace shall rule over Ireland once more!"
 ireland.94.b: "Actually, we'd rather not support such a motion"
 ireland.95.t: "Democratic Supporters Forming a resistance!"
 ireland.95.d: "Though we succeeded in overthowing the democratic govenment in Dublin, some of our political opponents managed to escape, and have now been attempting to raise a resistance against us in an attempt to restore the Free State. Very soon they will launch a Civil War against us!"
 ireland.95.a: "Ireland is in Crisis"
 ireland.96.t: "Democratic Suporters launch a Civil War"
 ireland.96.d: "Having escaped to Cork, members of the former democratic government of the Free State have rallied dissidents and disloyal parts of the armed forces against us. Having organised themselves, they have now declared their intent to, by any means necessary, take the fight to, in a quote 'The limp-backed cowards who would rather see Ireland oppressed by a new tyrant than follow our destiny towards a republic'.\n\n It is clear that this insurrection will have to be put down by force."
 ireland.97.t: "[IRE.GetNameDef] invites us to the Atlantic Alliance"
 ireland.97.d: "We have recieved an invitation from the Irish ambassador to join them in their new military alliance, seeking to ensure the protection and stability across the Atlantic. How do we respond?"
 ireland.97.a: "We shall join this initiative"
 ireland.97.b: "We have no interest in such an alliance"
 ireland.98.t: "[FROM.GetNameDef] agrees to join the Atlantic Alliance"
 ireland.98.d: "The [FROM.GetAdjective] representative has responded positively to our invitation to our alliance, and has agreed to join us!"
 ireland.98.a: "Excellent!"
 ireland.99.t: "[FROM.GetNameDef] declines to join the Atlantic Alliance"
 ireland.99.d: "The [FROM.GetAdjective] representative has responded negatively to our invitation to our alliance, politely declining the invitation, and stating that [FROM.GetNameDef] has no intersest in such a pact."
 ireland.99.a: "Disappointing..."
 ireland.100.t: "[IRE.GetNameDef] Requests Overlordship of Ulster"
 ireland.100.d: "[IRE.GetNameDef] have approached us over the issue of Northern Ireland, requesting that we respect the territorial claims of their royal title to hand over Ulster and hand it over to them post-haste, so that our royal families will no longer be drawn into conflict over the contested title. In return, they have offered to respect the position of the protestant church and the opinions of the unionists in Ulster, to try and make the transfer as peaceful as possible. Handing over the region would certainly improve our relations with the Irish, but would obvisouly come at a territorial cost."
 ireland.100.a: "Hand over Ulster, and commit resources to ensure a peaceful transfer"
 ireland.100.b: "Hand over Ulster reluctantly"
 ireland.100.c: "We have a duty to the unionists of Nothern Ireland"
 ireland.101.t: "[ENG.GetNameDef] hands over Ulster"
 ireland.101.d: "Respecting our claim to the region, [ENG.GetnameDef] has arranged a formal deal between kings as a friendly exchange, handing over Ulster, and creating a special commission to help us make the transfer smooth and peaceful"
 ireland.101.a: "Great!"
 ireland.102.t: "[ENG.GetNameDef] hands over Ulster"
 ireland.102.d: "Wishing to avoid further conflict with us, [ENG.GetNameDef] has handed over Ulster to us, respecting the claim of our royal title. Our representatives however noted that the [ENG.GetAdjective] ambassador was rather unenthusiastic about the whole affair, and its clear that they will not be lending us any more aid any time soon."
 ireland.102.a: "Good News!"
 ireland.103.t: "[ENG.GetNameDef] refuses to hand over Ulster"
 ireland.103.d: "The [ENG.GetAdjective] ambassadors have refused to acknowledge our claims to Ulster, stating that [ENG.GetNameDef] has a duty to protect the unionists of Ulster, and upholod the 1921 plebicite.\n\n should we wish to claim the territory, we shall have to use other means..."
 ireland.103.a: "Disappointing..."
 ireland.104.t: "The British Depart Northern Ireland"
 ireland.104.d: "With Britain withdrawing from all of its contested territories across the globe, they have officially handed over Northern Ireland to us, leaving behind a small commission to try and ensure a peaceful transfer of power, in spite of remaining Unionists in the region."
 ireland.104.a: "Ireland is whole once more!"
 ireland.106.t: "The Irish Air Ace"
 ireland.106.d: "We have recently recieved reports from our air marshals of a certain pilot having recently achieved a string of victories. Having moved with his family to Britain in 1936, and trained in the RAF from 1938, Brendan Eammonn Fergus Finucane is an Irishman by birth, and with his homeland coming into conflcit with a foreign power, returned to Ireland to volunteer for our air force. Our air command is now considering giving him a promotion to wing commander for his victories - set to make him our youngest wing commander ever."
 ireland.106.a: "Brilliant flying boys!"
 ireland.107.t: "The Irish Air Ace"
 ireland.107.d: "We have recently recieved reports from our air marshals of a certain pilot having recently achieved a string of victories. Having moved with his family to Britain in 1936, and trained in the RAF from 1938, Brendan Eammonn Fergus Finucane is an Irishman by birth, and despite his shaky early carreer, seems to have matured into a skillful and successful pilot. Our air command is now considering giving him a promotion to wing commander for his victories - set to make him our youngest wing commander ever."
 ireland.107.a: "Brilliant flying boys!"
 
 IRE_news.1.t: "End of the Anglo-Irish Trade War"
 IRE_news.1.d: "Earlier this week, British and Irish officials came to an agreement in Westminster, formally putting an end to the Anglo-Irish Trade War, which has dogged the relations between the two nations since 1932. \n\n The Trade War has been particularly harsh on the Irish economy, which has suffered considerably following the 1929 depression. With the lifting of the tit-for-tat tarriffs on British and Irish goods by the opposite nation, regular trade can now resume, to the economic benefit of both nations."
 IRE_news.1.b: "Glad we have finally put the Economic War behind us!"
 IRE_news.1.a: "A complicated relationship those two nations have."
 IRE_news.2.t: "Ireland Joins the Commonwealth"
 IRE_news.2.d: "Earlier this week, the Irish Ambassador under the instruction of W. T. Cosgrave and the Fine Gael party, made a trip to London to officially confirm Ireland's ties to the Commonwealth, and commit it to goals shared with the British. \n\n A great contrast to the politics previously pursued by Eamon de Valera and the Fianna Fáil, few would have predicted such an event just a few years ago. Though some in [IRE.GetNameDef] see this U-turn as a betrayal of the national cause, and submission to the British, Fine Gael officials have been keen to stress that they will be spending every effort to assert Ireland's independence as a member of the Commonwealth, seperate from Britain. Time will tell if these words carry water."
 IRE_news.2.a: "I thought those two hated each other?"
 IRE_news.2.b: "A toast to our friends!"
 IRE_news.3.t: "[IRE.GetNameDef] Joins the Allies"
 IRE_news.3.d: "Fearing the rise of Fascism on the continent, and the overthrow of global democracy, Ireland has officially commited itself to the side of the Allies. In an interview, the Irish Ambassador said: 'We here in Ireland are no strangers to struggling for our independence - for our right to rule ourselves, speak our own language, have our own faith, and our own way of life. For 700 years, we have waged a war against tyranny and foreign rule, but now the time has come for us to stop looking out only for ourselves, for there are others who, as we speak, are being suppressed and oppressed by foreign tyrants who grow stronger by the day. No longer can we sit idly by on our laurels, content with our own accomplishments in [IRE.GetNameDef], and must come to the defence of democracy and self-rule across the globe."
 IRE_news.3.a: "A brave gamble for a small nation"
 IRE_news.3.b: "We welcome their support"
 IRE_news.3.c: "We shall have to conquer them too"
 IRE_news.3.e: "No going back now..."
 IRE_news.4.t: "[IRE.GetNameDef] Joins the Axis"
 IRE_news.4.d: "It is well known that there is little love lost between the Irish and the British, but few would have predicted that grievances would boil over into outright war. With Britain now pre-occupied with war on the continent, [IRE.GetNameDef] has moved to press its claim on Northern Ireland. \n\n The six counties voted by plebicite to remain part of the United Kingdom in 1921, but Irish Republicans have continually re-asserted that they should rightfully belong to Ireland. As the Irish mobilise their forces to the border, it remains to be seen exactly what this development will mean for Ireland, and the world as a whole."
 IRE_news.4.a: "A brave gammble for a small nation"
 IRE_news.4.b: "We welcome their support"
 IRE_news.4.c: "A troubling development..."
 IRE_news.4.e: "No going back now..."
 IRE_news.5.t: "[IRE.GetNameDef] Joins the Comintern"
 IRE_news.5.b: "Following recent instability in the country, [IRE.GetNameDef] has now formally commited itself to the Communist International, seeking to position itself as a western bastion of marxism from which to participate in the international struggle. Observers on both sides are now closely watching developments in the region, as [IRE.GetNameDef] remains distant, and relatively isolated from its new Allies. Only time will tell what will come of this gamble."
 IRE_news.5.a: "A brave gamble for a small nation"
 IRE_news.5.b: "We welcome their support"
 IRE_news.5.c: "Another Day, Another Bolshevik, it seems..."
 IRE_news.5.e: "No going back now..."
 IRE_news.6.t: "Ireland Reunited"
 IRE_news.6.d: "Following talks between Dublin and Westminster, [ENG.GetNameDef] has handed over administative control of Northern Ireland to [IRE.GetNameDef]. Originally, the six counties of Northern Ireland voted by plebicite to remain part of the United Kingdom in 1921, spurning the Irish Free State which was created at the same time. However recent closer co-operation between the two has limited the importance of the Ulster Border. Now, fearing that the region could prove a strategic weakness, the argument was made that [IRE.GetNameDef] could to a better job defending the island if they had full control. \n\n With a majority protestant populace in contrast to the rest of Ireland, it is expected that this transfer of power will not be without its troubles."
 IRE_news.6.a: "An unorthodox way of pursuing territorial expansion"
 IRE_news.6.b: "Our Co-operation makes us stronger"
 IRE_news.7.t: "The IRA sieze Northern Ireland"
 IRE_news.7.d: "The IRA, who launched an illegal and unofficial campaign against British forces in Ulster several months ago, have now succeeded in their goals, defeating local defence forces and assuming control over the region. Fearing becoming a rogue state however, IRA commanders have, as a result of a unanimous vote, handed over control of the region to the Irish government.\n\n With the withdrawal of British forces, Ireland finally holds control of the whole island, but the irregular and questionable circumstances under which they have come under possession of Ulster may yet land them in hot water."
 IRE_news.7.a: "What a troubled region that is"
 IRE_news.7.b: "We cannot let this stand!"
 IRE_news.7.c: "Whole at last, but at what cost?"
 IRE_news.8.t: "The Second Irish Civil War!"
 IRE_news.8.d: "Over the past few days, hostility has erupted between political factions in Ireland, with hard-line republicans and IRA members launching an irregular resistance against the Dublin Govenment. Rebels have reportedly demanded 'An immediate handover of power for the salvation of Ireland, so that the republic can be freed from British influence and tyranny which remains latent within the halls of Dublin', echoing similar calls to resist by Anti-Treaty forces during the civil war of 1921-22. \n\n For their part, Irish officials have condemned the 'illegal' violence, declaring their intent to suppress, as necessary, the IRA insurgents who seek to usurp the legitimate government of Ireland."
 IRE_news.8.a: "The Fate of Ireland hangs in the Balance"
 IRE_news.9.t: "the Second Irich Civil War"
 IRE_news.9.d: "Following the sudden coup carried out by politically-backed IRA cells in Dublin, hostilities have broken out between the newly-empowered Dublin government, and former officials who have escaped the capital. Establishing a rival government in Cork, they now seek to 'restore the legitimate government of Ireland', and 'Oust the traitors that hold Dublin'. Officials of the new Government in Ireland issued a curt and no-nonsense response that there will be nothing more than 'death for traitors', re-iterating their claims to Ireland."
 IRE_news.10.t: "IRA insurgents sieze the Government in Ireland!"
 IRE_news.10.d: "A few days ago, a politically-backed IRA cell launched a sudden and unannounced attack on the Dublin parliament, storming the Dáil and capturing members of the Seanad in a chaotic raid, and effectively overthrowing the elected government of Ireland. In their place, the IRA have empowered members of former fringe parties, who no seek to form their own govenment, with or without the approval of the people. What exactly this means for Ireland, and the wider world, remains to be seen."
 IRE_news.10.a: "A dangerous development"
 IRE_news.10.b: "Proof of the inherent weakness of democracy" 
 IRE_news.11.t: "Unionists Rebel in Northern Ireland"
 IRE_news.11.d: "It was no secret that the Irish annexation of Northern Ireland would not be without difficulties, but few could have predicted the dramatic turn of events that have played out over the past few weeks.\n\n Following a chaotic clash in Belfast, Irish Gardai forces have been forced to abandon the city, leaving rebels from the Ulster Volunteer Forces took control. Following the fall of Belfast, Irish control of the region collapsed rapidly, with protestant, unionist, and pro-British rebels emerging all across the six counties.\n\n A situation of informal war now exists between [IRE.GetNameDef] and the provisional authorities in [NIR.GetNameDef]."
 IRE_news.11.a: "What a troubled region that is"
 IRE_news.11.b: "This is a difficult situation..."
 IRE_news.11.c: "We must act!"
 IRE_news.12.t: "Irish Monarchists sieze Dublin!"
 IRE_news.12.d: "In an unexpected turn of events, armed individuals identified as members of the Irish Monarchist Society have launched an unprovoked attack on the centre of Irish Government in Dublin. Taking several key members of the government hostage, they proceeded to demand the immediate handover of power to members of the Monarchist Society, putting an end to what they have declaimed as 'The Weak and ineefective Free State', and enabling a transition into an 'independent and free kingdom of Ireland'. \n\n Despite continued skirmishes throughout the Irish Capital, the monarchists now hold control over the Irish State, at least for now. No doubt we shall soon see what this means for Ireland."
 IRE_news.12.a: "A concerning turn of events..."
 IRE_news.12.b: "It had to be done."
 IRE_news.13.t: "Leopoldo O'Donnell Crowned as King of Ireland"
 IRE_news.13.d: "In a grand ceremony in Dublin, Leopoldo O'Donnel has been crowned as King of Ireland, the first native Irishman to hold that title since 1198. Leopoldo, who has adopted the reginal name Lugh, is the standing head of the O'Donnell clan of Tyrconnel, a long noble Irish lineage.\n\n Previously titled as the Duke of Tetuán of Spain, the Spanish title has been passed to his brother Carlos, so that Lugh can relocate to Ireland, and commit himself to his new royal duties fully. It remains to be seen what this means for Irish Politics, or for the United Kingdom, whose kings' still claim the title of King of Ireland." 
 IRE_news.13.a: "The Irish supporting a King? Whatever next?"
 IRE_news.13.b: "Dia dhaoibh Ard-Rí na hÉireann!"
 IRE_news.14.t: "Jorge Maria O'Neill Crowned as King of Ireland"
 IRE_news.14.d: "In a grand ceremony in Dublin, Jorge Maria O'Neill has been crowned as King of Ireland, the first native Irishman to hold that title since 1198. Jorge, who has adopted the reginal name Sior, is the standing head of the O'Neills of Clandeboye, in turn descended from the legendary Niall Noígíallach, and the old high kings of Ireland.\n\n Previously a notable resident of Portugal, Sior has moved his clan permanantly to Ireland so that he can commit himself to his new royal duties fully. It remains to be seen what this means for Irish Politics, or for the United Kingdom, whose kings' still claim the title of King of Ireland." 
 IRE_news.14.a: "The Irish supporting a King? Whatever next?"
 IRE_news.14.b: "Dia dhaoibh Ard-Rí na hÉireann!"
 IRE_news.15.t: "Oskar Hohenzrollern Crowned as King of Ireland"
 IRE_news.15.d: "In a grand ceremony in Dublin, Prince Oskar of Prussia has been crowned as King of Ireland. The Prussian Prince was reporteldy selected to serve the Irish as their king following a similar thoughts during the 1916 rising to pass the crown to Oskar's younger Brother Joachim, who unfortunately committed suicide following his father's abdication in 1920.\n\n With a Hohenzrollern sitting on a European throne once more, many observers have begun wondering what influence he shall hold over Irish relations with both Britain and Germany." 
 IRE_news.15.a: "The Irish supporting a King? Whatever next?"
 IRE_news.15.b: "Dia dhaoibh Ard-Rí na hÉireann!"
 IRE_news.16.t: "Ireland forms a Dual-Monarchy with Britain"
 IRE_news.16.d: "In a grand ceremony in Dublin, the king of the United Kingdom has been crowned (again) as King of Ireland. In this unexpected turn of events has come as a result of a new agreement hashed out between Dublin and Westminster to re-establish the Windsor King as king of Ireland under a new arrangement of an Austro-Hungarian styled dual-monarchy.\n\n Ireland how has a special reletionship with Britain, completely unique from all other nations of the commonwealth, with the Westminster government holding no authority at all over Ireland, but the King empowered as the head of the Irish state, able to take an active role when necessary in guiding and supporting the loyal government of Ireland." 
 IRE_news.16.a: "The Irish supporting a King? Whatever next?"
 IRE_news.16.b: "Dia a shábháil an Rí!"
 IRE_news.16.c: "Not what we expected, but a good result nonetheless!"
 IRE_news.17.t: "the Second Irich Civil War"
 IRE_news.17.d: "Following the sudden coup carried out by the monarchist society in Dublin, hostilities have broken out between the newly-empowered Dublin monarchists, and former officials who have escaped the capital. Establishing a rival government in Cork, they now seek to 'restore the legitimate government of Ireland', and 'Oust the traitors that hold Dublin, to restore the true and free republic of Ireland'. Officials of the new Government in Ireland issued a curt and no-nonsense response that there will be nothing more than 'death for traitors', re-iterating their claims to Ireland." 
 IRE_news.18.t: "Monarchists ignite a Civil War in Germany"
 IRE_news.18.d: "Following a period of agitation by monarchist supporters of the house of Hohenzrollern in Germany, a number of Wermacht officers and civilian officials have launched a revolt in the west of the country, seeking to restore the Kaiser to his throne and overthrow the National Socialist government.\n\n It is widely suspected that this revolt has been sponsored by the Irish, primarily at the behest of their King Oscar, who is a son of the deposed Kaiser, though the Irish government has refused to comment on the alleged connection."
