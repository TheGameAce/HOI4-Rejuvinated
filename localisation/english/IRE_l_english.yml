 IRA_strength_down.tt: "This will make the IRA §Gweaker in the event of a Civil War§!"
 IRE_sieze_the_republic.tt: "The higher §Ysupport§! your chosen party has, and the higher the §YIRA strength§!, the less likely remaining democratic supporters will be able to form a resistance"
 IRE_northern_campaign.tt: "We will be able to stage a border conflict in an attempt to quickly §Ysieze Northern Ireland§!, but §Rthis incident has a chance to escalate into full war§!"
 NIR_revolt.tt: "If not quickly crushed, §R[ENG.GetNameDef] may intervene against us!§!"
 NIR_revolt_warning.tt: "We do not quickly regain control of Northern Ireland, §R[ENG.GetNameDef] may intervene against us!§!"
 fuse_the_kingdoms.tt: "This will cause us to inherit the §YBritish Focus Tree§!, §Rlosing our own§!. §gMake sure that we have completed all that we want to before fusing the kingdoms§!"
 IRE_overthrow_the_free_state.tt: "The §YHigher the support for the Monarchists§!, the §RLower the change Democratic forces will organise a resistance!§!"
