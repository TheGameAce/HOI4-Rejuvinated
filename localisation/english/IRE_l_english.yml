 pay_assises_in_full: "Pay Annuities in full"
 pay_assises_in_full_desc: "If in doubt, we can pay the whole of the land annuities demanded by the British. Though this will do no good to our national prestige, it will at least put an end to the Economic War"
 grant_industrial_subsidies: "Grant industrial Subsidies"
 grant_industrial_subsidies_desc: "By releasing some funds, we can give Irish industry a small boost to offset the advese effects of the trade war."
 encourage_increased_tillage: "Encourage Increased Tillage"
 encourage_increased_tillage_desc: "By encouraging the expansion of the Agricultural sector, we will be able to provide better for our civilian population."
 buy_irish_campaign: "Buy Irish Campaign"
 buy_irish_campaign_desc: "By encouraging our citizens to buy Irish-made goods, we can expand the market for Irish industry, negating some of the effects of the trade war."
 attract_foreign_capital: "Attract foreign Capital"
 attract_foreign_capital_desc: "If we cannot rely on trade with the British to fund our industry, we shall simply have to look elsewhere"
 construction_subsidies: "Grant Construction Subsidies"
 construction_subsidies_desc: "By releasing funds to the construction sector, we can encourage further industrual growth."
 coal_cattle_pact: "Negotiate the Coal-Cattle Pact"
 coal_cattle_pact_desc: "As things stand, British tarriffs on Irish beef means our farmers cannot sell their produce to their prime overseas market. At the same time, our industrial growth has increased the demand for British coal, which is equally difficult to buy due to our own tarriffs. The solution is simple - by negotiating a deal to allow us to freely sell our cattle to the British in return for buying their coal, we can start to bring an end to the Economic War."
 confirmation_of_agreements_act: "Negotiate the Confirmation of Agreements Act"
 confirmation_of_agreements_act_desc: "With economic tensions cooling between us and Britain, we can reach out to negotiate a proper settlement to our grievances, and put this Economic War behind us."
