 IRE_ulster_investments_desc: "We should work to expand our government contacts to include Ulster-based industries"
 invest_in_shortbros: "Invest in Shortbros Aeronautics PLC"
 invest_in_HnW: "Invest in Harland and Wolff Shipyard"
 invest_in_james_mackie: "Invest in James Mackie & Sons"
 invest_in_workman_clark: "Invest in Workman, Clark & Co."
 integrate_northern_ireland: "Integrate Northern Ireland"
 integrate_northern_ireland_forcefully: "Suppress Resistance in Northern Ireland"
 suppress_ira_in_northern_ireland: "Suppress the IRA in Northern Ireland"
 suppress_ira_in_northern_ireland_militarily: "Suppress the IRA in Northern Ireland militarily"
 IRE_IRA_decisions: "The Irish Republican Army"
 IRE_IRA_decisions_desc: "Following the Irish Civil War, the Irish armed forces split, with hard-line opponents of the Anglo-Irish treaty breaking off and forming the Irish Republican Army, a military group of insurgents and irregulars who, beyond the control of the Dublin government, seek to establish an Ireland completely free of British influence by any means necessary - even if this includes undermining the state and waging war in Ulster.\n\n Forming a significant power bloc in Irish politics, they could be both a boon and a curse to the state, aiding it in some affairs, but undermining it in others. Managing both the strength and loyalty of these partisans will prove a difficult task.\n\n The IRA currently has a loyalty of [?IRA_loyalty]/15 \n\n The IRA currently has a strength of [?IRA_strength]/30"
 denounce_IRA_action: "Denounce IRA actions"
 denounce_IRA_action_desc: "By attacking IRA policies and actions, we may be able to provoke them against us - a dangerous move, but one that may have long-term benefits if we are significantly stronger than them."
 honour_IRA_dead: "Honour the IRA dead"
 honour_IRA_dead_desc: "Many solders who, past and present, have fought with the IRA, or the Anti-Treaty forces in the Civil War, were patriots, and wanted a free Ireland - just as we do. By honouring their dead and memorialising their heroes we can prove to them that we hold some sympathy for their cause."
 pardon_IRA_soliders: "Pardon IRA Soldiers"
 pardon_IRA_soliders_desc: "By pardoning some captured IRA soldiers caught conducting operations on Irish soil, we can win favour with the IRA, but it would also result in them growing stronger"
 imprison_IRA_sympathisers: "Imprison IRA associates"
 imprison_IRA_sympathisers_desc: "Whilst it is hard to move against IRA insurgents themselves, we can move against their sympathisers and associates who help supply them with arms and cover their tracks. Arresting them will weaken the IRA somewhat, but without clear evidence of wrongdoing it might attract some hostile press."
 allign_towards_IRA: "Allign ourselves with the IRA"
 allign_towards_IRA_desc: "Our two goals are not as different as we might think. By endorsing some more moderate IRA goals we may be able to rile up war support among the Irish populace, though this may also benefit IRA recruitment"
 use_IRA_against_political_opponents: "Use the IRA against political opponents"
 use_IRA_against_political_opponents_desc: "The IRA are above all else, patriots and nationalists. Whilst this could make them dangerous opponents, it can also make them manipulable. By branding political opponents and dissidents traitors to Ireland, we may be able to attract the IRA's attention towards them, and suppress ideas and talk that does not benefit us."
 recruit_IRA_soldiers: "Recruit IRA soldiers"
 recruit_IRA_soldiers_desc: "By campaigning to IRA moderates, we can attract them away from the Republican Army towards the National Army, extending our recruitment capabilities whilst contesting the IRA. Naturally, the IRA leadership won't like this."
 promote_IRA_causes: "Promote IRA Causes"
 promote_IRA_causes_desc: "The Cause of the IRA and of Ireland are one of the same. We should let everyone know that."
 foster_IRA_sympathies_in_the_army: "Foster IRA sympathies in the Army"
 foster_IRA_sympathies_in_the_army_desc: "If we are preparing to overthrow the Dublin Government, we should seek to accomodate prominent members of the National Army with the IRA, to ensure that they do not turn against us less the situation turn ugly."
 send_arms_to_the_IRA: "Send arms to the IRA"
 send_arms_to_the_IRA_desc: "We can discreetly ship off some equipment due to the National Army off to the IRA. This should help them prepare to take on the Dublin Government when the time is right."
 clamp_down_on_IRA: "Clamp Down on the IRA"
 clamp_down_on_IRA_desc: "We can deploy the Gardai against known IRA cells to initiate a direct confrontation. By mopping up easy targets we can slowly whittle down their strength"
 raid_IRA_depots: "Raid IRA storehouses"
 raid_IRA_depots_desc: "We have identified a number of storehouses where the IRA are covertly storing their arms and equipment. By launching a raid against these sites, we can reclaim the weapons that should rightfully be ours whilst hindering future insurgent operations."
 army_reeduction_campaign: "Army Re-education Campaign"
 army_reeduction_campaign_desc: "We have noticed that some individuals within the armed forces hold sympathies for the IRA. We cannot allow this to continue, and must seek to set them back on the right path."
 foster_monarchist_sympathies_in_IRA: "Foster Monarchist Sympathies in the IRA"
 foster_monarchist_sympathies_in_IRA_desc: "The IRA represent those disillusioned with the Dublin government. Though not naturally our allies, we could find some common ground with them, and seek to foster some sympathies among them. A strong Irish monarchy would, after all, be just as good at defending Irish interests as an assertive republic"
 steal_IRA_arms: "Steal IRA arms"
 steal_IRA_arms_desc: "Our agents within the IRA have access to several key stores of arms and ammunition. We of course, could make better use of them."
 seek_allies_in_IRA: "Seek Allies in the IRA"
 seek_allies_in_IRA_desc: "Though the Republican Army are not natural allies to the monarchist cause, our shared opposition to the Dublin govenment gives cause for us to find what common cause we can with the IRA, who undoubtedly prove useful allies should we end up in conflict with the Free State government."
 atlantic_alliance_category: "The Atlantic Alliance"
 atlantic_alliance_category_desc: "We have a vision for an extensive military pact spanning the Atlantic to ensure the security of both Europe and the Americas. We should make the effort to invite other nations to this pact to make it stronger."
 invite_FROM: "Invite [FROM.GetNameDef] to the Atlantic Alliance"
 integrate_the_IRA: "Convince the IRA to disband"
 integrate_the_IRA_desc: "Though we certainly cannot fault the patriotism of the men of the IRA, we cannot deny that by operating as an armed force completely detatched from the state, they are undermining our control over our own foreign relations, and sapping good men and expertise away from the national forces. If we are able to establish a good relationship with the IRA, we might be able to request them to disband their organisation, and join the National Army instead, finally uniting our forces and healing the wounds of the Civil War.\n\nThe IRA however have made it quite clear however, that they will not willingly lay down their arms until the state has committed to ensuring the complete, unilateral withdrawal of Britian from Ireland by any means necessary."
 impending_IRA_rising: "Impending IRA Rising"
 impending_IRA_rising_desc: "Ran out of patience with the Dublin Government, the IRA are planning to rise up against us. If we do not act soon, they may launch a Civil War!"
 IRA_going_to_revolt: "The IRA have committed to staging a revolt"
 northern_campaign_initiate_incident: "Initiate Border Incident in Northern Ireland"
 northern_campaign_initiate_incident_desc: "By staging a small border incident with the IRA, we can gain an excuse to escalate we need to start the Northern Campaign in earnest"
 northern_campaign_incident_warning_defender: "Border Incident in Northern Ireland"
 northern_campaign_incident_warning_defender_desc: "The IRA have staged a small-scale border incident in Northern Ireland, likely as a preamble to a larger campaign. We should move some troops into the region to ensure the region is protected"
 northern_campaign_escalation_warning_defender: "[IRE.GetNameDef] can escalate the conflict"
 northern_campaign_escalation_warning_defender_desc: "Following slowly growing conflict in Northern Ireland, our forces briefly chased insurgents into Irish territory. [IRE.GetNameDef] has now declared this an attack on Irish soil, and has the power to escalate the conflict and involve the National Army if they desire."
 northern_campaign_escalate_incident_to_border_conflict: "Escalate Incident to Border conflict"
 northern_campaign_escalate_incident_to_border_conflict_desc: "According to our plans, the [FROM.GetAdjective] defenders in Northern Ireland have crossed the border illegally into [IRE.GetNameDef]. We are now in a position to declare this an attack on our sovreignity, and deploy the National Army to the region to initiate a full-scale border war"
 northern_campaign_time_until_cancelled: "Time until the Border Conflict is cancelled"
 northern_campaign_time_until_cancelled_desc: "If we do not achieve a timely victory in Northern Ireland, we shall have to call the offensive off"
 northern_campaign_escalate_conflict: "Escalate the Border Conflcit in Northern Ireland"
 northern_campaign_escalate_conflict_desc: "We can escalate the conflict in Northern Ireland to bring more force to bear, but it will bring us closer to a full-blown war."
 northern_campaign_escalate_to_war: "Escalate the Conflict in Northern Ireland to War"
 northern_campaign_escalate_to_war_desc: "We have no other option but to declare a fomal war against [FROM.GetNameDef] over Northern Ireland"
 northern_campaign_back_out_of_conflict: "Back out of Conflict in Northern Ireland"
 northern_campaign_back_out_of_conflict_desc: "We cannot risk futher escalation in Northern Ireland, and should back down"
 IRE_sabotage_in_progress: "Is currently working on a sabotage operation"
 nothern_ireland_category: "Troubles in Northern Ireland"
 nothern_ireland_category_desc: "The six counties of Northern Ireland are dominated by a protestant and unionist population, in direct contrast to the catholic and republican-leaning populace of the south. It has remained a constant source of friction between Ireland and Britain since its partition from the south in 1921."
 ENG_intervention_warning: "Impending British intervention"
 reinforce_the_monarchist_plot: "Steal Weapons for the monarchist plot"
 reinforce_the_monarchist_plot_desc: "Overthrowing the Free State to establish an Irish Monarchy will require a show of force. By stealing weapons from the National Army, we can bolster the strength of the monarchist cause and prepare the insurrection"
