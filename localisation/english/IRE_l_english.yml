#Focuses
 IRE_HONOURABLE_ARMY: "An Honourable Army"
 IRE_HONOURABLE_ARMY_desc: "The Irish army has chosen to adapt to the tactics and discipline of a professional army."
 IRE_PEOPLES_ARMY: "A People's Army"
 IRE_PEOPLES_ARMY_desc: "The Irish army has chosen to adapt the tactics of the War of Independence."
 IRE_FIGHTING_IRISH: "The Fighting Irish"
 IRE_FIGHTING_IRISH_desc: "The aid of foreign Irish soldiers has improved the training of the Irish military."
 IRE_OFFICER_SCHOOL: "Officer School"
 IRE_OFFICER_SCHOOL_desc: "The establishment of an officer school has aided the training of both old officers from the War of Independence and new candidates."
 IRE_BLUESHIRTS: "The Army Comrades Association"
 IRE_BLUESHIRTS_desc: "The Army Comrades Association, also known by their nickname, the Blueshirts, is a paramilitary organisation under the control of the Taoiseach Eoin O'Duffy, recruiting among only the native Irish who profess the Christian faith. The Irish government has integrated the ACA into their security forces, for the defence of Ireland and hunting down syndicalists and other internal threats."
 IRE_LAST_STAND: "Come Woe or Weal"
 IRE_LAST_STAND_desc: "Ireland is once again alone at war against the British, and the survival of Irish independence looks unlikely. With nothing to lose the Irish people are willing to fight until the end."
 IRE_CNM: "Female Military Service"
 IRE_CNM_desc: ""
 IRE_BLUEBLOUSES_idea: "Women's Auxiliary"
 IRE_BLUEBLOUSES_idea_desc: ""
 IRE_PATRIOTIC_NATION: "Patriotic Nation"
 IRE_PATRIOTIC_NATION_desc: ""
 IRE_HOMEDEFENSE: "Fortify the Shannon"
 IRE_HOMEDEFENSE_desc: "One of Ireland's key natural landmarks is the River Shannon, dividing the east and west of Ireland. Our military has proposed fortifying both sides of the river, so that we can hold the line along the Shannon in the event of an enemy invasion."
 IRE_COASTALDEFENSE: "An Balla Éireannach"
 IRE_COASTALDEFENSE_desc: "Our next proposal for the defence of Ireland is to build a wall of coastal defences along Ireland's eastern and southern shores, where a naval invasion is most likely to take place."
 IRE_ANTIAIR: "Anti-Air Batteries"
 IRE_ANTIAIR_desc: "Despite the grave threat that the British or German air force could pose to Ireland, we have been slow to build any defences against them. This must change, and quickly."
 IRE_CITADELPROJECT: "Tearmann - The Citadel Project"
 IRE_CITADELPROJECT_desc: "While we have focused on fortifying the coasts and the rivers, the cities themselves have remained somewhat unprotected. We have come up with a plan known as the Citadel Project, the first stage of the project would be to erect land forts in our major cities protecting them from assault."
 IRE_CITADELDUBLIN: "Citadel Dublin"
 IRE_CITADELDUBLIN_desc: "The second stage of the plan is to completely fortify one of our major cities with forts, anti-aircraft equipment, coastal forts and radar. We must choose only one city however, as we don't have the resources to fortify them all."
 IRE_CITADELCORK: "Citadel Cork"
 IRE_CITADELCORK_desc: "The second stage of the plan is to completely fortify one of our major cities with forts, anti-aircraft equipment, coastal forts and radar. We must choose only one city however, as we don't have the resources to fortify them all"
 IRE_CITADELBELFAST: "Citadel Belfast"
 IRE_CITADELBELFAST_desc: "The second stage of the plan is to completely fortify one of our major cities with forts, anti-aircraft equipment, coastal forts and radar. We must choose only one city however, as we don't have the resources to fortify them all"
 IRE_ORGANISEPARTISANS: "Mobilise the Irish Defence Corps"
 IRE_ORGANISEPARTISANS_desc: "Now that we are at war, we must mobilise our reserve units in order to increase our ability to resist a naval invasion."
 IRE_NAVY: "An tSeirbhís Chabhlaigh"
 IRE_NAVY_desc: "Despite being an island nation and neighbouring to Britain, our navy only consists of a few destroyers mainly used for search and rescue of drowning fishermen. Unless we want to be entirely reliant upon, or vulnerable to the British Navy, we must seek to expand"
 IRE_WOLFHOUNDS: "Wolfhounds of the Irish Sea"
 IRE_WOLFHOUNDS_desc: "During the Great War, the Germans subverted the British naval superiority by attempting an undersea blockade. Our first step should be to research submarine tactics so that we can also replicate this success."
 IRE_WOLFHOUNDS2: "The Second Fenian Ram"
 IRE_WOLFHOUNDS2_desc: "In 1881 Irish inventor John Phillip Holland created a submarine known as the Holland Boat No. II, nicknamed the Fenian Ram, for the Irish Republican Brotherhood. Now we must follow in their footsteps and build a submarine fleet of our own to defend ourselves against naval threats."
 IRE_SCREENS: "Screen Research Project"
 IRE_SCREENS_desc: "The purpose of a screen is to scout for a fleet and protect it from submarines and aircraft, something that would be useful in detecting threats before they reach our shores."
 IRE_CARRIERS: "Carrier Technology"
 IRE_CARRIERS_desc: "Now that we have begun to reform our navy, we should research aircraft carriers, a ship capable of basing bombers while at sea, which could be very useful in tandem with a reforming of our air force."
 IRE_CAPITALFLEET: "A Grand Fleet for Ireland"
 IRE_CAPITALFLEET_desc: "If we are to ever walk out of the shadow of Britain, we must be able to build a fleet similar to their own. While this will take a long time it will pay off in the end, extending our reach and military capablilities over the British Isles and beyond."
 IRE_CAPITALFLEET2: "Better Battleships"
 IRE_CAPITALFLEET2_desc: "Now that we have begun to build a grand fleet to match the British, we should look into the building of a Super-Heavy Battleship. While it will take a long time to build and will be expensive, the results should be worth it."
 IRE_RUTHLESS: "Ruthless Interdiction Doctrine"
 IRE_RUTHLESS_desc: "Guerre de course, or Handelskrieg, is an old tactic involving disrupting an enemy nation's trade by attacking its merchant shipping. With this, we could damage our foes without having to face their fleet."
 IRE_DIRECTCONFRONTATION: "Direct Confrontation Doctrine"
 IRE_DIRECTCONFRONTATION_desc: "If Ireland is to be safe from a naval blockade or invasion, we must directly confront the enemy Navy and force them to turn back to their ports."
 IRE_MARINES: "Muirshaighdiúirí"
 IRE_MARINES_desc: "Now that we have expanded our navy, we should consider the training of an elite unit of marines to spearhead a land invasion."
 IRE_INFANTRY: "An tArm"
 IRE_INFANTRY_desc: "Military tactics and doctrines have changed since the end of the Civil War in 1923. The Irish army on the other hand has not. It is essential that we stay up to date when the outbreak of war in Europe is looking more and more likely by the day."
 IRE_DIRECTIONOFTHEARMY: "Direction of the Army"
 IRE_DIRECTIONOFTHEARMY_desc: "Currently our military is divided on how to proceed. Should we imitate the standard armies of other nations, or adapt the tactics and structure we pioneered during our War of Independence to conventional warfare?"
 IRE_MOBILE1: "Mobile Warfare"
 IRE_MOBILE1_desc: "Military strategy is changing, with mobility and tank warfare becoming popular. We too must keep up with the times, and begin studying mobility doctrines."
 IRE_MOBILE2: "Motorising the Saighdiúirí"
 IRE_MOBILE2_desc: "If mobility warfare is to work our regular infantry must be motorised so as to outrun the enemy otherwise our spearheads will be left stranded and vulnerable to encirclement themselves."
 IRE_MOBILE3: "Armour Advances"
 IRE_MOBILE3_desc: "Tanks are key to mobile warfare, forming the spearhead of an encirclement of the enemy. We must research tanks if our mobility tactics are to be successful."
 IRE_FIREPOWER1: "Superior Firepower"
 IRE_FIREPOWER1_desc: "The new mobility doctrine is primarily for nations that intend to invade others, which Ireland has no need of. Our doctrine should be focused on the use of artillery and preserving the lives of our men."
 IRE_FIREPOWER2: "Small Arms Focus"
 IRE_FIREPOWER2_desc: "An army cannot fight without supplies or ammunition. While German supplies and American donations proved helpful during the War of Independence, we must learn to research and produce our own supplies."
 IRE_FIREPOWER3: "The Dublin Arsenal"
 IRE_FIREPOWER3_desc: "Our doctrine depends on producing artillery so as to preserve the lives of our men. As we cannot just depend on just buying from international munitions companies we must study how to produce artillery ourselves."
 IRE_ANHONOURABLEARMY: "An Honourable Army"
 IRE_ANHONOURABLEARMY_desc: "Our army must be focused on order, discipline, and defence. Whilst the Citizen Army have captured the spirit of patriotism, the war of Independence and the Civil War has proven that enthusiasm alone does not win wars."
 IRE_APEOPLESARMY: "A People's Army"
 IRE_APEOPLESARMY_desc: "Our army must be focused on speed and quick planning, adapting some of the tactics that allowed us to defeat the British during the Irish War of Independence to conventional warfare."
 IRE_PATRIOTICMOVEMENT: "Patriotic Movement"
 IRE_PATRIOTICMOVEMENT_desc: "Now that we have decided to adapt our War of Independence tactics to the modern day, we should promote a campaign comparing the modern army to the Flying Columns and that we pioneered these tactics to invigorate a sense of national pride in our people."
 IRE_FIGHTINGSPIRIT: "The Fighting Irish"
 IRE_FIGHTINGSPIRIT_desc: "While some of our forces are having trouble adapting to our decision, many Irishmen, some in Ireland and some outside, have fought for armies such as the American or British armies. We could hire their help to assist in training our troops."
 IRE_PROFESSIONALARMY: "A Professional Army"
 IRE_PROFESSIONALARMY_desc: "Now that we have decided to move to a more professional army, we must train our soldiers and officers, many of whom are still accustomed to more conventional fighting."
 IRE_OFFICERSCHOOL: "Establish an Officer School"
 IRE_OFFICERSCHOOL_desc: "Currently, many officers in our army lack proper training as a result of our armed forces being descended from a guerrilla rather than a professional army. If we were to establish an officer training school which would train civilians and enlisted personnel in order for them to gain a commission as Irish officers, it would improve the quality of our military."
 IRE_BLUEBLOUSES: "Women's Auxiliary"
 IRE_BLUEBLOUSES_desc: "Women have much to contribute to our nation and its defence. We must open positions to those brave daughters of Ireland who would serve their country."
 IRE_FLYINGCOLUMNS: "The New Flying Column"
 IRE_FLYINGCOLUMNS_desc: "While the reforming of the Army has been a long process, it is now finally complete and the nation is stronger and prouder for it, knowing that in the event of an invasion the defence of Ireland will be in strong and able hands."
 IRE_AIRFORCE: "An tAerchór"
 IRE_AIRFORCE_desc: "One glaring error of the Irish military so far has been the lack of any air force, seen as too unimportant and expensive. With the British on our doorstep building one of the largest air forces in the world, it is vital that we correct this if we are to stand a chance."
 IRE_CHANNELDEFENSE: "Defend the Irish Sea"
 IRE_CHANNELDEFENSE_desc: "Britain's historical strength has been its navy, with which it could defend its island from invasion. Whilst building a comparable fleet would take long, and be a costly effort, if we research and build a series of bombers capable of destroying ships at sea, we may be able to protect our shores without needing to build a strong navy."
 IRE_CHANNELDEFENSE2: "Advanced Bombing Campaign"
 IRE_CHANNELDEFENSE2_desc: "Now that we have researched naval bombers, we should use our newfound knowledge to research other kinds of bombers that can help us take the fight to our enemies."
 IRE_FIGHTERFOCUS: "Protect Éire from Above"
 IRE_FIGHTERFOCUS_desc: "In the event of a war, an enemy air force would be able to invade Ireland's skies with impunity. We must research aircraft that can prevent this and shoot any tresspassing planes out of the sky."
 IRE_FIGHTERFOCUS2: "Heavy Fighter Programme"
 IRE_FIGHTERFOCUS2_desc: "With our fighter research having been a success, we should now look into building heavy fighters, effective at a longer range than regular fighters and adept at destroying enemy bombers."
 IRE_AIRBASEEXPANSION: "Expand our Airfields"
 IRE_AIRBASEEXPANSION_desc: "Currently our airfield in Dublin are subpar compared to those of many other nations, we must bring it up to standard. Establishing a second airfield certainly wouldn't hurt either."
 IRE_WOMENPILOTS: "Women In The IRAF"
 IRE_WOMENPILOTS_desc: "While many have been opposed to the inclusion of women in the Irish army or navy despite the service of the Cumann na mBan during the Easter Rising, attitudes are more open to allowing them to enlist in the air force, perhaps following famous American pilot Amelia Earhart's example."
 IRE_AIRCOMMAND: "Radar Technology"
 IRE_AIRCOMMAND_desc: "Now that we have built an air force for ourselves, we should investigate radar technology. This would allow us to detect enemy aircraft, making it easier for our planes to destroy them, as well as giving us intelligence on enemy troops and ships."
 IRE_FLEXIBILITYBOOST: "Maintain Flexibility"
 IRE_FLEXIBILITYBOOST_desc: "Our military factories are designed to be cheap, quick to build, and easily torn down and converted when needs be. The same ethos should apply to what we build on them. New lines need to get up and running immediately and being able to swap and start on the fly will be of great asset for this 'mobile' industrial strategy."
 IRE_flexibility_boost: "Industrial Flexibility"
 IRE_flexibility_boost_desc: "In the ever changing environment of war it's vital that we're able to quickly adapt and change our production lines when possible."
 IRE_NAVALINDUSTRY: "Naval Industry Focus"
 IRE_NAVALINDUSTRY_desc: "If Ireland is construct a fleet of any particular relevance then she will quickly need to start constructing new naval facilities. Investment into the naval industry of our nation will be a step in the right direction towards protecting the Irish Sea, and our nation itself, against foreign aggression."
 IRE_SUBDOCKYARD: "Cork Submarine Foundry"
 IRE_SUBDOCKYARD_desc: "Some of our naval theorists believe that submarines might very well be the naval weapons of the future. If we want to heed their advice, then we'd better start producing more of them. By developing a specialised submarine foundry and testing facility in Cork, we can focus our naval production on the development of these predator undersea ships."
 ire_cork_foundry: "Cork Submarine Foundry"
 ire_cork_foundry_desc: "The development of a submarine testing facility and production yard in Cork has allowed us to more efficiently produce submarines."
 IRE_DESTROYERDOCKYARD: "Dublin Destroyer Shipyard"
 IRE_DESTROYERDOCKYARD_desc: "Screens play a key role in any naval strategy. Ireland might not have much of a fleet to speak of at present, but our admirals know the basics. Whatever type of fleet we are likely to produce, screens will be important. A shipyard in Dublin could be adapted to focus upon the development of destroyers and light cruisers."
 ire_dublin_shipyard: "Dublin Destroyer Shipyard"
 ire_dublin_shipyard_desc: "We are now able to produce light screen ships at a more rapid rate courtesy of a specialised shipyard opened in Dublin."
 IRE_CAPITALSHIPDOCKYARD: "Belfast Capital Shipwright"
 IRE_CAPITALSHIPDOCKYARD_desc: "Making use of the Shipyards built by the British in the City, we could turn Belfast into our own naval centre, capable of producing large capital ships to dominate the seas."
 ire_belfast_shipwright: "Belfast Capital Shipwright"
 ire_belfast_shipwright_desc: "Belfast is one of the finest shipbuilding cities in the world and it's got even better thanks to a shipyard designed entirely to build battleships for our nation."
 IRE_MILITARYINDUSTRY: "Military Industry"
 IRE_MILITARYINDUSTRY_desc: "Whilst the people of Ireland would prefer peace to war, there is no doubt that war may very well be on the horizon. With an enemy across the Irish Sea and more still waiting in the wings, Ireland must build her military industry if she hopes to survive the coming storm."
 IRE_HEAVYINDUSTRY: "Heavy Industrial Focus"
 IRE_HEAVYINDUSTRY_desc: "Ireland is a small nation and can only spare so much space for a military arms complex. The military factories that we do build need to be built specialised for war, able to run efficient production lines and generate a high degree of output. We cannot waste our time with converting civilian factories into war-machines."
 IRE_heavy_industry: "Irish Heavy Industry"
 IRE_heavy_industry_desc: "We have decided to prioritise our military industry with a focus on costlier, but more efficient factories, specialised entirely for the production of armaments."
 IRE_NORMALINDUSTRY: "Medium Industrial Focus"
 IRE_NORMALINDUSTRY_desc: "To adapt to the ever-changing environment, it is vital that the Irish arms industry stays flexible. We might expect to be at war eventually, but that war will not last forever. We need to be able to adapt our industrial economy to war and peace in equal measure, and a medium industrial focus will do just that, with cheaper and more flexible military factories."
 IRE_medium_industry: "Irish Medium Industry"
 IRE_medium_industry_desc: "We have decided to approach our military industry with an adaptive approach, preferring to build several smaller military factories which can be converted to civilian factories, and vice versa."
 IRE_HEAVYPRODUCTIONDRIVE: "Production Drive"
 IRE_HEAVYPRODUCTIONDRIVE_desc: "Now that we've geared up our industry and specialised it for war, we can start capitalising on those gains by giving our workers a more specific training with regards to armaments production, allowing new lines to be produced more efficiently."
 IRE_production_drive: "Heavy Production Drive"
 IRE_production_drive_desc: "Faster, harder, and stronger: that's quickly becoming the ethos of the Irish military industry. We may not outnumber our enemies, but we will do our best to outproduce them."
 IRE_DEFENSEPRODUCTION: "Industrial Defence Plan"
 IRE_DEFENSEPRODUCTION_desc: "It's vital that our military industry not be crippled by enemy bombers during war-time. By constructing elaborate defence systems to protect our military factories, we will be able to minimise the damage done through enemy bombers."
 IRE_defense_production: "Industrial Defence Plan"
 IRE_defense_production_desc: "All of our military factories will be built partially underground and with reinforced roofing and exhausts in an effort to defend against enemy bombers."
 IRE_HEAVYPRIORITIES: "Define the Industrial Strategy"
 IRE_HEAVYPRIORITIES_desc: "Strategic decisions are made beyond the battlefield, too. Just as our generals must decide our army's priorities, so too must we decide upon our industrial strategy. A bi-annual committee will be set up to review our priorities and allow us to focus our production efforts on one major production line, increasing its output significantly."
 ire.hp.tt: "Define a §Yproduction area§! to focus on at an §Oincreased cost§! in exchange for §Ghigher output.§!\n\n"
 ire.128.t: "Industrial Strategy"
 ire.128.d: "As part of our heavy military industry plans, we are able to prioritise a certain area of armaments production in order to meet and facilitate our overall strategic goals. We can greatly increase our output in any given area for a period of time, however this will cost a considerable amount of our income so it should be done wisely, if at all."
 ire.128.a: "Focus on producing tanks."
 ire.128.b: "Our lads need more guns."
 ire.128.c: "We need more planes in the sky."
 ire.128.e: "There's no need for a priority right now."
 ire_armor_prio: "Armour Focus"
 ire_armor_prio_desc: "We are producing a much greater number of tanks at an extensive consumer goods cost."
 ire_infantry_prio: "Infantry Equipment Focus"
 ire_infantry_prio_desc: "We are producing a much greater number of infantry equipment at an extensive consumer goods cost."
 ire_airforce_prio: "Air Force Focus"
 ire_airforce_prio_desc: "We are producing a much greater number of planes at an extensive consumer goods cost."
 IRE_ARMYTREE: "Reforming the Armed Forces"
 IRE_ARMYTREE_desc: "Since the end of the Civil War, the Irish military has fallen into stagnation, and suffered from downsizing alongside economic woes. As international tensions are growing, the military must be revitalised."
 IRE_IEAA: "Irish Economic Advancement Act"
 IRE_IEAA_desc: "Despite gaining our freedom, the economy of our fine island has laid stagnant for quite some time and is even, in some places, decaying. With the passing of the Irish Economic Advancement Act (IEAA) the Dáil can address this vital issue. Ireland may be small, but her people are industrious, and her cities have plenty of room to grow."
 IRE_ARD: "Agricultural Reform Drive"
 IRE_ARD_desc: "The rural areas of Ireland are by far the most neglected by the government to date, and could easily serve as a starting point for radical economic improvement. Our farming methods are woefully out of date compared to the agricultural revolutions taking place in mainland Europe, and our infrastructure is woefully behind."
 IRE_MFR: "Mechanised Farming Reform"
 IRE_MFR_desc: "There's no doubt that the farming industry is one of the biggest in our nation. The current agricultural techniques used however leave a lot to be desired. Through adopting the sort of advances in mechanisation seen in the United States and in Europe, we can bring our farms up to speed. Farms feed the people, and therefore they are the lifeblood of growth."
 IRE_ARD_idea_upgrade.tt: "§GAdditional benefits§! may be unlocked via the §YAgricultural Reform Drive§! focus"
 IRE_MFR1: "Mechanised Farming Reforms"
 IRE_MFR1_desc: "The basic supply of mechanised farming hardware to our agricultural industry has begun, allowing us to improve our food production."
 IRE_MFR2: "Regional Mechanised Farming Reforms"
 IRE_MFR2_desc: "We have successfully distributed mechanised farming equipment to the most rural areas of our nation, allowing us to significantly improve our food production."
 IRE_MFR3: "National Mechanised Farming Reforms"
 IRE_MFR3_desc: "We have implemented mechanised farming across the entire nation, allowing our farms to produce much more food. Ireland's people will no longer be hungry."
 IRE_RRMB: "Rural Renovations and Maintenance Board"
 IRE_RRMB_desc: "The rural areas of Ireland are in need of considerable renovations and maintenance. There is currently no public body tasked with doing these repairs, leaving rural communities to rely on notoriously unreliable private businesses. Putting this into government hands will keep our roads well maintained in good repair. A national maintenance team will also no doubt have benefits should the nation be at war."
 IRE_RRMB1: "Maintenance Board"
 IRE_RRMB1_desc: "The Irish Rural Renovations and Maintenance Board work to diligently repair damaged infrastructure. In times of war, they can also be put to use repairing factories and other vital emplacements."
 IRE_RRMB2: "Regional Maintenance Board"
 IRE_RRMB2_desc: "The Irish Rural Renovations and Maintenance Board work to diligently repair damaged infrastructure. In times of war, they can also be put to use repairing factories and other vital emplacements. Thanks to increased spending, the maintenance board is more efficient."
 IRE_RRMB3: "National Maintenance Board"
 IRE_RRMB3_desc: "The Irish Rural Renovations and Maintenance Board work to diligently repair damaged infrastructure. In times of war, they can also be put to use repairing factories and other vital emplacements. Thanks to a heavy investment by the government, the maintenance board is extremely efficient."
 IRE_TNTN: "TransÉireann National Network"
 IRE_TNTN_desc: "The railway infrastructure left in place by the British is functional but lacking in comparison to the new high speed rail infrastructure being constructed in Europe. We should learn from our continental neighbours and make an effort to modernise our railways. This will also have a significant effect on our industry's productivity, allowing us to get raw materials more easily to our factories."
 IRE_IFI_upgrade.tt: "§GAdditional benefits§! may be unlocked via the §YIndustry For Ireland§! focus"
 IRE_TNTN1: "TransÉireann National Network"
 IRE_TNTN1_desc: "Our modern railway system is helping to rapidly transport goods around the country, allowing our factories to operate more efficiently."
 IRE_TNTN2: "Expanded TransÉireann National Network"
 IRE_TNTN2_desc: "Our modern railway system is helping to rapidly transport goods around the country, allowing our factories to operate more efficiently. An expanded investment has opened up several more efficient industry-only railroads."
 IRE_TNTN3: "Massive TransÉireann National Network"
 IRE_TNTN3_desc: "Our modern railway system is helping to rapidly transport goods around the country, allowing our factories to operate more efficiently. The government has invested massively in this project, turning our once backwards infrastructure into the one of the great envies of Europe."
 IRE_IFI: "Industry for Ireland"
 IRE_IFI_desc: "Our civilian industry has an enormous potential for growth. There is a major unemployment problem in our nation, with many families too poor to regularly feed themselves. By revitalising our industry we can both create new jobs and improve the economic strength of our nation."
 ire.IFI.tt: "\nBegin §Yindustrialising§! in Ireland.\n\n"
 IRE_RTN: "Revitalise the North"
 IRE_RTN_desc: "having taken control of Northern Ireland, we must invest in the region to bring it in line with the developments of other regions of Ireland, and repair any damages that may have been caused during the transition between British and Irish rule."
 IRE_HnW: "Harland & Wolff Shipyard"
 IRE_HnW_desc: "At the turn of the century, the Harland & Wolff shipyard in Belfast was the largest in the world. With combined British and Irish investments, it could lay claim to that title once more"
 IRE_SHORTBROS: "Short Brothers Aerospace PLC"
 IRE_SHORTBROS_desc: "Founded in 1908, the Short Brothers private limited company was the world's first private aircraft manufacturer. They expanded their operations into Ulster soon after and Belfast became their headquarters. The increased Irish investment into the region has greatly benefitted the company."
 IRE_NIIF: "National Industrial Investment Fund"
 IRE_NIIF_desc: "Constructing and expanding our nations industry is vital if Ireland is going to play any sort of key role on the world stage in the future. We need to make funds available to finance our rapid industrialisation project. This will allow us more room for expansion and more efficient construction, depending on how much funds we make available."
 IRE_NIIF1: "National Industrial Investment Fund"
 IRE_NIIF1_desc: "The investments made into this fund are specially designated to the acquisition of building materials and expert construction teams to more quickly build up our civilian industry."
 IRE_NIIF2: "Expansive National Industrial Investment Fund"
 IRE_NIIF2_desc: "The investments made into this fund are specially designated to the acquisition of building materials and expert construction teams to more quickly build up our civilian industry. Our level of investment allows these benefits to be even more effective."
 IRE_NIIF3: "Massive National Industrial Investment Fund"
 IRE_NIIF3_desc: "The massive amount of investment made by the Irish government into the development of our national industry ensure that we are able to build civilian factories at a much faster speed than we otherwise could."
 IRE_ESIC: "Éireann Scientific Innovation Council"
 IRE_ESIC_desc: "Our nation is greatly lacking in scientific progress compared to many other industrialised nations. Presently Ireland has very little in the way of funding for scientific research. Beginning to develop a proper scientific programme will be essential if we are to significantly develop our nation."
 IRE_ESIC1: "Éireann Scientific Innovation Council"
 IRE_ESIC1_desc: "The ESIC was created to help Ireland's scientific progress. A team of well-paid scientists, experts in different fields, shall work night and day to facilitate Ireland catching up with the rest of the world."
 IRE_ESIC2: "Experienced ESIC"
 IRE_ESIC2_desc: "Over time, the ESIC has developed and expanded, recruiting more members for it's research teams and becoming more efficient."
 IRE_ESIC3: "Renowned ESIC"
 IRE_ESIC3_desc: "The ESIC have become a major force of scientific progress and are significantly contributing to Ireland's scientific progress."
 IRE_IRF: "Industrial Research Priorities"
 IRE_IRF_desc: "Our national has a vital need for industry, and that need is coupled with an equal requirement for research and development. Many of our factories are decrepit and out of date. To build a modern industry, Ireland needs modern factories. Investing into industrial research will allow us to move further towards progress."
 IRE_ISP: "Irish Synthetics Project"
 IRE_ISP_desc: "Although our people are industrious and our island ripe for industrialisation, there is no accounting for the unfortunate lack of natural resources available to us relative to the major powers of the world. Oil and rubber are particularly problematic, so if we would like to make use of these resources in our industries, Ireland must develop a functional synthetics programme."
 IRE_XPESIC: "Expand the ESIC"
 IRE_XPESIC_desc: "The ESIC have been doing a fantastic job to date, but they still have room to grow. Further investment will facilitate their involvement in a greater number of research projects, enabling our teams to cover more ground and deal with more fields. This will improve our overall flexibility in the field of science."
 IRE_GGLF: "The Great Green Leap Forward"
 IRE_GGLF_desc: "Ireland has come a long way in a short time. The passage of the IEAA will no doubt mark a monumental victory in the history of our nation. It's time to step out of the shadows of British imperialism. Ireland is a plantation no longer. She is a nation reborn."
 IRE_ISRA: "Improved Safety Regulations Act"
 IRE_ISRA_desc: "Industrial accidents, factory sicknesses and other mishaps are frighteningly common in Irish industry. The lack of proper safety standards has been a cause for great concern among the workers and has seen them turn increasingly towards Syndicalism. We can all agree that no worker should feel like his workplace is a dangerous environment. It's time to make a change."
 IRE_SAFETY_REFORMS: "Safety Reforms"
 IRE_SAFETY_REFORMS_desc: "Our recent safety reforms have been a big success. Factories in Ireland could previously be dangerous environments and work-related accidents were common. Now, less workers are laid off because of injury or sickness, increasing the productivity of our industries."
 IRE_SCOB: "The Steel City"
 IRE_SCOB_desc: "Steel is an important resource and one of the few that Ireland can reliably produce thanks to her existing natural resources and trade connections. Belfast used to have a decent steel industry but much of the business closed down. We could rejuvenate the steelworks once again and reap the benefits."
 IRE_DBR: "Irish Zinc Mining"
 IRE_DBR_desc: "Ireland has the potential to be one of Europe's leading producers of zinc. Although not particularly useful in the production of heavy military equipment, zinc is used in a variety of electronics and having access to a substantial supply of this natural resource would certainly be an asset for Ireland's research and development teams. It may also come in handy when building radar stations."
 IRE_ZINC: "Irish Zinc Industry"
 IRE_ZINC_desc: "Recent developments of our zinc mining industry have allowed us to harvest a significant amount of zinc ore, providing our research teams with valuable material for their electronics development. It's prominent use in electrical equipment will also make the construction of radar stations in our nation more efficient."
 IRE_DSI: "Expand Dublin's Smelting Industry"
 IRE_DSI_desc: "The smelting industry in Dublin presently affords us a very small amount of aluminium. If we were to give this industry significant funding then we could dramatically increase the amount of aluminium that we receive, increasing our trade leverage and fuelling our industries."
 IRE_UTP: "Ulster Trading Ports"

 IRE_end_the_trade_war: "End the Trade War"
 IRE_end_the_trade_war_desc: "Since 1932 we have been locked in a trade war with Britain, causing a good deal of economic hardship that we are only just starting to recover from. For the good of our two nations, we must put an end to the conflict."
 IRE_prepare_industrial_growth: "Prepare Industrial Growth"
 IRE_prepare_industrial_growth_desc: "Civilian Industry is the backbone of the economy. If we are to come out of the trade war better off, we must lay the foundations for a thriving civilian industrial sector"
 IRE_kickstart_arms_industry: "Kickstart the Arms Industry"
 IRE_kickstart_arms_industry_desc: "We must foster a recovery from the trade war. Investing in the arms industry will serve the dual purpose of aiding our economic recovery, as well as supplying our armies."
 IRE_fine_gael: "Fine Gael"
 IRE_fine_gael_desc: "de Valera's Fianna Fáil have been leading Ireland in a dangerous direction, straining our relationships with our neighbours, plunging Ireland into a devastating economic war, and systematically taking apart the Irish constitution. The Fine Gael party seek to right their wrongs, and uphold the terms of the Anglo-Irish Treaty that were agreed upon in the 1920s."
 IRE_confirm_ties_to_commonwealth: "Confirm ties to the Commonwealth"
 IRE_confirm_ties_to_commonwealth_desc: "The recent developments in Irish politics have left us in a relationship that is - to say the least - awkward with Britain and the Commonwealth. We should work to rebuild the ties that he Fianna Fáil have deconstructed, and reaffirm our position, so everyone is clear where we stand."
 IRE_cooperation_with_britain: "Co-operation with Britain"
 IRE_cooperation_with_britain_desc: "Though there are certainly those in Ireland who would baulk at the idea of acively co-operating with the British, we must rise above our past disagreements, drawing closer to our neighbour in order to ensure the continued security of our nation in these uncertain times."
 IRE_request_return_of_treaty_ports: "Request return of the Treaty Ports"
 IRE_request_return_of_treaty_ports_desc: "Part of the 1921 Anglo-Irish treaty was the lease of several Irish ports for use by the Royal Navy for resupply and docking. Now that we have moved closer to Britain once more, we can request that these ports be returned fully to Irish control."
 IRE_attract_commonwealth_investors: "Attract Commonwealth Investors"
 IRE_attract_commonwealth_investors_desc: "We cannot rely on economic ties to Britain alone, but our ties to the Commonwealth puts us in a good position to advertise Ireland to investors from other nations of the Commonwealth: Canada, Australia, South Africa and New Zealand. We might even be able to attract investors from India and Britian's colonies as well."
 IRE_ulster_industrial_exchange: "Ulster Industrial Exchange"
 IRE_ulster_industrial_exchange_desc: "There are several important and potentially useful industrial companies that have been established in Belfast and Northern Ireland that have been scouted as possible contractors for the Irish state. By using British intermediaries, we could gain direct access to their expertise, without compromising current political arrangements"
 IRE_rally_rural_ireland: "Rally Rural Ireland"
 IRE_rally_rural_ireland_desc: "Ireland is still a largely rural nation, with a large amount of our population living away from our centres of administration. We should make the effort to extend our reach into these remote areas, and rally every able man to our side for the future of Ireland."
 IRE_towards_a_new_state: "Towards a new State"
 IRE_towards_a_new_state_desc: "Though we have stuck by the terms of the Anglo-Irish treaty, we cannot remain bound by it forever. Indeed, as de Valera's Fianna Fáil were attempting, we too should make ammendments to the constitution, and lay the foundations for a more permanent, independent and stable Irish state."
 IRE_request_transfer_of_ulster: "Request the Transfer of Ulster"
 IRE_request_transfer_of_ulster_desc: "Having proven our loyalty to Britain and the Commonwealth, we can approach Britain to request the formal transfer of Northern Ireland into our control, so that it may be better defended from invastion. Inviting the British to oversee the transfer, we can work to ensure that the wants of the Ulster Unionists and protestants are properly respected, and the transition is made as peaceful as possible"
 IRE_finna_fail: "Fianna Fáil"
 IRE_finna_fail_desc: "The failings of Cosgrove's past governments and our continued rocky relationship with Britain has proven the need for decisive leadership, willing and able to take a staunch and uncompromising stance against remaining British influence in government, so that we may forge a truely independent Republic of Ireland."
 IRE_revise_the_constitution: "Revise the Constitution"
 IRE_revise_the_constitution_desc: "If we are to found the republic, we must first decide on a proper constitution upon which to found the new state."
 IRE_president_of_eire: "President of Éire"
 IRE_president_of_eire_desc: "No republic can have a king - and no Irish state should accept the rule of the British King. We should ammend the Constitution to replace the authority of the King of Ireland with a president instead."
 IRE_negotiate_return_of_treaty_ports: "Negotiate the return of the Treaty Ports"
 IRE_negotiate_return_of_treaty_ports_desc: "As part of the 1921 Anglo-Irish Treaty, we have lent several ports to the British for use by the Royal Navy. As we move towards complete independence, we should negotiate the return of these ports, so that we become fully sovreign within our own nation."
 IRE_the_new_state: "The New State"
 IRE_the_new_state_desc: "It is time to push the new constitution into effect and proclaim Éire - a new, fully independent republic of Ireland, which holds Republican Virtue, the Gaelic Language, and the Catholic Church as its core, defining values."
 IRE_engage_with_foreign_capital: "Engage with Foreign Capital"
 IRE_engage_with_foreign_capital_desc: "Now we are politically independent of Britain, we should seek to distance ourselves from them economically as well, by establishing financial links to other nations around the globe."
 IRE_down_with_the_anti_national: "Down with the Anti-National!"
 IRE_down_with_the_anti_national_desc: "Though it may be hard to believe, there are still some in Ireland who do not agree with the recent changes brought in by the Fianna Fáil, declaring that they either go too far, or not far enough. Those critics are clearly not true patriots, touting anti-national propaganda that would see us fall under the influence of Berlin, Moscow, or worse of all London."
 IRE_take_stance: "Take Stance"
 IRE_take_stance_desc: "Though we have thus far been largely concerned with our own affairs, the world around us is changing rapidly. As conflict looms on the horison, Ireland must be ready to assert its position."
 IRE_strict_neutrality: "Strict Neutrality"
 IRE_strict_neutrality_desc: "The best way to safeguard Ireland's independence is to proclaim complete neutrality in the ongoing war. We care not for their squabbles, and see all sides as completely equal."
 IRE_join_allies: "Join Allies"
 IRE_join_allies_desc: "We cannot simply stand by whilst democracy as we know it comes under threat. If the Germans come for the British, they will surely come for us next. Though it may not be the most popular move, we must allign ourselves with our former enemy to face a far greater threat."
 IRE_join_axis: "Ireland's Opportunity"
 IRE_join_axis_desc: "Britain's woes are Ireland's Opportunity. By signing a pact with the Germans, we can gain the support we need to take the fight to the British, and push them out of Ireland for good!"
 IRE_plan_w: "Plan W"
 IRE_plan_w_desc: "Britain have offered to aid us in defence of Ireland should it be invaded by a hostile force. We should take them up on this offer, and make pre-emptive plans for the defence of our nation should we find ourselves staring down the barrel of some expansionist European power."
 IRE_emergency_powers_act: "The Emergency Powers Act"
 IRE_emergency_powers_act_desc: "The current conlfict threatens to swallow Ireland whole. As such, it is necessary to force through legislation to extend the powers of the state, granting us more control over the Irish ecomony and the army, so that we will be ready should the war reach Irish shores."
 IRE_clamp_down_on_IRA: "Clamp Down on the IRA"
 IRE_clamp_down_on_IRA_desc: "The IRA are a clear threat to our security. Acting as insurgents beyond state control they could easily fall prey to foreign infuence, either aiding an enemy invasion of Ireland, or perhaps even drawing us into an unwanted war ourselves. We must put an end to their acvitity, even if it means them turning their arms against us."
 IRE_emergency_powers_ammendment: "Emergency Powers Ammendment"
 IRE_emergency_powers_ammendment_desc: "The Scale of the current conlfict is unprecidented, and as such, we must take unprecidented measures to ensure that Ireland is ready for whatever comes its way. Handing over more power to the Taoiseach to give him more extensive control over propaganda, legislation and the police will help ensure that Ireland stands ready to face those who threaten it, both from within and without."
 IRE_legacy_of_revolution: "Legacy of Revolution"
 IRE_legacy_of_revolution_desc: "The weak politicians of Dublin have proven that the democratic process is too slow and unwilling to sieze the moment and push for the establishment of an independent Republic free of the British. We must now look to the IRA and the political fringe for the leadership we need to bring Ireland the independence and unity it deserves"
 IRE_corporate_party: "The Corporate Party"
 IRE_corporate_party_desc: "The inheritor of the ideals of the Blueshirts, the Corporate party seek to reclaim the spirit of the Easter Rising. No longer constrained by the moderates of Fine Gael, they have the will to take the fight to the British, and form an independent Republic where the Union Jack shall not fly anywhere on our island."
 IRE_irish_workers_league: "The Irish Workers' League"
 IRE_irish_workers_league_desc: "The Communists have long been a part of the Irish revolutionary spirit: They participated with the Citizens' army in the Easter Rising, formed Soviets during the revolution, and formed a core of the Anti-Treaty forces during the Civil war, fighting against nascient British Oppression, and yet they have been routinely pushed aside and suppressed by the Dublin govnement. Well no more, the people will no longer flirt with de Valera's Fianna Fáil, and will strike out on their own to claim their destiny."
 IRE_court_the_ira: "Court the IRA"
 IRE_court_the_ira_desc: "The IRA have long been known to be sympathetic to the political doctrines sidelined by the Dublin govenment, and serve as the natural ally to a political movement seeking to overthrow the decadant Dublin officials. We should negotiate their support for our upcoming takeover."
 IRE_sieze_the_republic: "Sieze the Republic"
 IRE_sieze_the_republic_desc: "The time has come, we shall wait no longer. With the IRA in tow we shall march on Dublin and demand that control over the government be handed over to us, so that we can forge the independent Republic of Ireland, and honour the memory of the Easter Rising"
 IRE_autarky: "Irish Autarky"
 IRE_autarky_desc: "If we are to strike out on our own, we must be economically independent from our neighbours - something that past Irish govenments failed to grasp. Following similar attempts in Europe, we should seek to establish our own self-sustaining autarky."
 IRE_empower_the_IRA: "Empower the IRA"
 IRE_empower_the_IRA_desc: "We care not for treaties with the British, and should reward those who continued to fight for a free Ireland when even their own govenment told them to lay down their arms. By empowering the IRA, and establishing them as a branch of the National Army, we can reuinify the Irish Armed forces, and benefit from their expertise in their long fight against British tyranny."
 IRE_the_irish_brigade: "The Irish Brigade"
 IRE_the_irish_brigade_desc: "Fighting in foreign wars is nothing new for the Irish. We should form a proper Brigade of men willing to fight overseas for causes that are just and righteous"
 IRE_oust_the_remnants: "Oust the Remnants"
 IRE_oust_the_remnants_desc: "Despite our efforts, there are still some small remaining vestiges of British influence and the old order. We should take the opportunity to recify this, seizing their property and adapting it to more useful ends."
 IRE_take_back_the_treaty_ports: "Take back the Treaty Ports"
 IRE_take_back_the_treaty_ports_desc: "Several ports were lent to the British under the provision of the Anglo-Irish Treaty allowing them to resupply and dock Royal Navy vessels in Ireland. This is a blight on our sovregnity, and should be recified immediately."
 IRE_s_plan: "S Plan"
 IRE_s_plan_desc: "S-Plan, or Sabotage Britain plan, is an IRA-devised plan to utilise contacts within Britain to sabotage aspects of British Industry, to slowly cripple their war effort from within."
 IRE_northern_campaign: "The Northern Campaign"
 IRE_northern_campaign_desc: "This is it, our opportinity to unite the whole of Ireland under our banner. We must prepare properly, so that we may cast the British into the sea, and ensure that they can never set foot on Ireland again."
 IRE_join_comintern: "Join the Comintern"
 IRE_join_comintern_desc: "Previously, all attempts made to form a Communist Party in Ireland were given support from the Communist internationl. We must now repay that favour, and join the international ourselves in the great struggle for the revolution."
 IRE_soviet_military_advisors:0 "Soviet Military Advisors"
 IRE_soviet_military_advisors_desc:0 "The Soviets have been kind enough to send us military advisors, who have helped us improve our armed forces greatly."
 
 IRE_revive_monarchist_cause: "Revive the Monarchist Cause"
 IRE_revive_monarchist_cause_desc: "In the early days of the Sinn Féin, before the dreadful civil war and the fracturing of the independence movement, we had a vision of a unified Ireland under an independent Irish high King, just like the Ireland of old.\n\n The fickle parties of democracy cannot be trusted to forge a unified Ireland. It is high time we return to earlier ideals."
 IRE_infiltrate_the_IRA: "Infiltrate the IRA"
 IRE_infiltrate_the_IRA_desc: "One would not think the Republican Army would ally the monarchist cause, but they are, after all, fellow opponents of the Dublin government, seeking to forge a better Ireland. With some effort, we could perhaps turn them towards our side, making them a useful ally against Dublin."
 IRE_prepare_the_coup: "Prepare the Coup"
 IRE_prepare_the_coup_desc: "If we are to overthrow the free state, we must be armed and ready. Funding national arms factories will help supply the national army, but we could also siphon off products for our own ends as well..."
 IRE_overthrow_the_free_state: "Overthrow the Free State"
 IRE_overthrow_the_free_state_desc: "We can wait no longer. The Free State must fall for the kingdom of Ireland to rise from the ashes and reclaim our past glory!"
 IRE_crush_the_IRA: "Crush the IRA"
 IRE_crush_the_IRA_desc: "Though we previously used them to aid us against the Free State, the IRA are becoming increasingly problematic to handle.\n\n It is now ever apparent to members of the monarchist movement that no REPUBLICAN army can ever be tolerated by a restored monarchy, and so, they must be crushed."
 IRE_integrate_the_IRA: "Integrate the IRA"
 IRE_integrate_the_IRA_desc: "We have, contrary to our conflicting namesakes, managed to form a stable allance with the Republican Army.\n\n We could however do much better by solidifying this alliance properly, and joining the IRA with the national army, burying the wounds left by the civil war forever."
 IRE_a_king_of_our_own: "A King of Our Own"
 IRE_a_king_of_our_own_desc: "A new royal Ireland deserves an Irish king, linked back to the old aristocracy and the ancient lineages. By reaching out to the descendents of those who left in the flight of the earls, we can secure for ourselves a true, Irish King"
 IRE_request_ulster_lordship: "Request the Ulster Lordship"
 IRE_request_ulster_lordship_desc: "The recently crowned king of Ireland is entitled to lordship over the six counties Ulster that remain part of [ENG.GetNameDef]. By approaching them, one kingdom to another, we may be able to acquire the northern region without needing to go to war."
 IRE_prepare_a_northern_campaign: "Prepare a Northern Campaign"
 IRE_prepare_a_northern_campaign_desc: "We have, by right of the Crown of Ireland, the right to lordship over the six counties of Ulster currently held by [ENG.GetNameDef]. For Ireland, and our king, we must press this claim."
 IRE_atlantic_alliance: "The Atlantic Alliance"
 IRE_atlantic_alliance_desc: "Situated on the western edge of Europe, we are somewhat geograpically isolated, with Britain as our only close neighbour. However, we need not be diplomatically dependent on the British. By reaching out to other nations both in Europe and America, we can turn our position on the edge of the Atlantic from one of isolation, to one of strength."
 IRE_the_prussian_prince: "The Prussian Prince"
 IRE_the_prussian_prince_desc: "At the time of the 1916 rising, it was thought that the crown of Ireland should be offered to Prince Joachim of Prussia, who could aid in the de-anglicanisation of Ireland, and serve as a respected king. Unfortunately, Joachim committed suicide in 1920, unwilling to accept his father's abdication. His brother Oskar however, is alive and well, and could still serve us as a strong king."
 IRE_kindle_monarchist_sympathy_in_germany: "Kindle Monarchist Sympathy in Germany"
 IRE_kindle_monarchist_sympathy_in_germany_desc: "Hitler has made it quite clear that there will be no restoration of the monarchy in Germany, despite the previous loyal service of our King Oscar, and other princes of Prussia within the German army.\n\n With a Hohenzollern on a throne once more however, we can prove to the German monarchists that not all hope is yet lost."
 IRE_ignite_german_revolt: "Ignite a German Revolt"
 IRE_ignite_german_revolt_desc: "Loyalists to the Kaiser in Germany cry out for our support in overthrowing the Nazi regime. With a small push, and a promise of support from us, we can ignite a revolt, and seek to restore the house of Hohenzollern to its proper dignity."
 IRE_the_dual_monarchy: "The Dual Monarchy"
 IRE_the_dual_monarchy_desc: "When Arthur Griffith first founded the Sinn Féin in 1905, he aimed for the creation of a dual monarchy between Britain and Ireland, established along similar lines as the Austo-Hungarian Compromise. It is high time that this vision is realised, and the Windsors return as king of Ireland, completely independent from the government of Westminster."
 IRE_an_equal_partner: "An Equal Partner"
 IRE_an_equal_partner_desc: "With the establishment of the Dual Monarchy, Ireland has become the equal of Britain politically. We should expand this, becoming a true equal partner, and the dual head of the commonwealth as well."
 IRE_fuse_the_kingdoms: "Fuse the Kingdoms"
 IRE_fuse_the_kingdoms_desc: "The Dual Monarchy now properly established in Britain and Ireland, and Irish economic might made equal to that of Britain, we are in a position to make our two kingdoms one, uniting the British Isles once more under a single banner, though one that now pays proper respect to the position of Ireland."
 IRE_draw_closer_to_germany: "Draw closer to Germany"
 IRE_draw_closer_to_germany_desc: "The German Reich would make a powerful ally should we wish to move against Britain. We should make the effort to reach out to them, and offer them our assistance."
 IRE_draw_closer_to_britain: "Draw closer to Britain"
 IRE_draw_closer_to_britain_desc: "In these uncertain times, we cannot afford to have an enemy on our doorstep. We must bury our past grievances with Britain, drawing closer to them in order to protect our nations from growing expansionist powers."
 IRE_negotiate_return_of_treaty_ports_neutrality: "Make a deal for the Treaty Ports"
 IRE_negotiate_return_of_treaty_ports_neutrality_desc: "As it stands, [ENG.GetNameDef] have access to a number of ports around Ireland for the purpose of docking and supplying the royal navy. This could be a source of unwanted intervetion when we prepare to overthrow the Free State, and as such, we should move to negotiate their return to Irish control."

 IRE_UTP_desc: "The Acqisition of Belfast offers us brand new opportunities for international trade. Though the British have built a sizable port in the City, there is still room for improvement. The large airfield in County Tyrone also offers us a new dimension of both trade and warfare that we may be able to exploit."
 IRE_ARD.tt: "Choises you make here will effect the other focuses in this branch"
 IRE_ind_exchange.tt: "This will also unlock §Yseveral Belfast-based contractors§! to be hired as §Ydesigners§! or §Yconcerns§!"
