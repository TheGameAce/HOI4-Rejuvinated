 IRE_trade_war: "Anglo-Irish Trade War"
 IRE_trade_war_desc: "Since 1932 Ireland and the United Kingdom have been locked in a crippling trade war over attempts to change the constitution of the Irish Free State, and the reimbursements demanded by Britain as part of the 1921 Anglo-Irish treaty involving land Annuities and financial loans granted to Irish tenant farmers originally under the Irish Land Acts of 1870-1909. De Valera's Fianna Fáil hoped that by imposing tarriffs on British goods, Ireland could foster native industry, provoking tit-of-tat tarriffs from the British. In addition, de Valera argues that as a result of the 1925 London Agreement, that cleared Ireland's need to contribute to repayment of British public debt, Land Annunities should also be cleared - a notion that Westminster contests. The result of this spat, paired with the Great Depression, has had a devastating effect on the Irish Economy, with the fallout with its largest trade partner leaving it strapped for materials and imports, whilst native industrial development remains sorely lacking."
 IRE_trade_war2: "Anglo-Irish Trade War"
 IRE_trade_war2_desc: "Since 1932 Ireland and the United Kingdom have been locked in a crippling trade war over attempts to change the constitution of the Irish Free State, and the reimbursements demanded by Britain as part of the 1921 Anglo-Irish treaty involving land Annuities and financial loans granted to Irish tenant farmers originally under the Irish Land Acts of 1870-1909. De Valera's Fianna Fáil hoped that by imposing tarriffs on British goods, Ireland could foster native industry, provoking tit-of-tat tarriffs from the British. In addition, de Valera argues that as a result of the 1925 London Agreement, that cleared Ireland's need to contribute to repayment of British public debt, Land Annunities should also be cleared - a notion that Westminster contests. The result of this spat, paired with the Great Depression, has had a devastating effect on the Irish Economy, with the fallout with its largest trade partner leaving it strapped for materials and imports, whilst native industrial development remains sorely lacking."
 IRE_trade_war_cooling: "Anglo-Irish Trade War Cooling"
 IRE_trade_war_cooling_desc: "Recent cooling of tensions in the Anglo-Irish Trade war has benefitted the economy"
 IRE_emergency_powers_act_idea: "Emergency Powers Act"
 IRE_emergency_powers_act_idea_desc: "In response to rising global tensions, the Irish state has passed legislation to gain more control of the country, in order to prepare a proper defence"
 IRE_nationalism: "Irish Nationalism"
 IRE_corporate_party_formed: "Greenshirts on the March"
 IRE_workers_league_reformed: "The Irish Workers League Reformed"
 IRE_defence_of_ireland: "The Defence of Ireland"
 IRE_defence_of_ireland_desc: "As the world is engulfed in flames around us, we must be ready to do our part to defend our homes, and those of our allies."
 IRE_autonomous_dominion: "The Autonomous Dominion"
 IRE_autonomous_dominion_desc: "The settlement of the 1921 Anglo-Irish treaty and the subsequent Irish Civil War has left the Free State of Ireland in a bizzare limbo - though it has, by-in-large, gained its independence from Britain, the King of the United Kingdom retains his title of King of Ireland, the Free State technically being a dominion of the British Empire. However, relations with Britain are naturally strained, and the Irish government has been constantly spending effort to emphasise its independence from the United Kingdom."
 IRE_autonomous_dominion2: "The Autonomous Dominion"
 IRE_autonomous_dominion2_desc: "The settlement of the 1921 Anglo-Irish treaty and the subsequent Irish Civil War has left the Free State of Ireland in a bizzare limbo - though it has, by-in-large, gained its independence from Britain, the King of the United Kingdom retains his title of King of Ireland, the Free State technically being a dominion of the British Empire. However, relations with Britain are naturally strained, and the Irish government has been constantly spending effort to emphasise its independence from the United Kingdom."
 IRE_autonomous_dominion_puppet: "The Autonomous Dominion"
 IRE_autonomous_dominion_puppet_desc: "The settlement of the 1921 Anglo-Irish treaty and the subsequent Irish Civil War has left the Free State of Ireland in a bizzare limbo, however, the recent developments and political swings between the Repblican Fianna Fáil and Fine Gael parties have resulted in a renegotiation of standings, and both the London and Dublin governments have reached an agreement on the position of Irish sovreignity and its possition within the Commonwealth."
 IRE_ira_0: "Integrated IRA"
 IRE_ira_0_desc: "[IRE.GetnameDef] has brought unity to the Irish Armed forces once more, uniting the Irish National Army and the Irish Republican Army into a single, unified force. No more does the nation's loyalties lie divided, and no longer do we feel the deep wounds left by the Irish Civil War"
 IRE_ira_1: "Empowered IRA"
 IRE_ira_1_desc: "Though Ireland fought as one for its independence during the revolution of 1919-21, the signing of peace in the 1921 Anglo-Irish Treaty precipitated disasterous effects on the young nation, with its politicians and armed forces splitting into pro- and anti-treaty camps during the Irish Civil War of 1922-23. Following the conditional victory of the pro-treaty forces, groups of irregulars vowed to continue the fight until all vestiges of British Influence were removed from the whole of Ireland. Taking the name of the Irish Republican Army, they stand as a completely seperate unit to the National Army, and act beyond govenement control. Keeping a check on the IRA is thus a keen interest of the Dublin govenment, lest the irregulars start another war, or worse, turn against the Irish Government. \n\n The IRA currently stands in an empowered state, enjoying close contact with the Dublin govenement, who in return, enjoy the co-operation of the IRA."
 IRE_ira_2: "Loyal IRA"
 IRE_ira_2_desc: "Though Ireland fought as one for its independence during the revolution of 1919-21, the signing of peace in the 1921 Anglo-Irish Treaty precipitated disasterous effects on the young nation, with its politicians and armed forces splitting into pro- and anti-treaty camps during the Irish Civil War of 1922-23. Following the conditional victory of the pro-treaty forces, groups of irregulars vowed to continue the fight until all vestiges of British Influence were removed from the whole of Ireland. Taking the name of the Irish Republican Army, they stand as a completely seperate unit to the National Army, and act beyond govenement control. Keeping a check on the IRA is thus a keen interest of the Dublin govenment, lest the irregulars start another war, or worse, turn against the Irish Government. \n\n The IRA are currently loyal to the Dublin Government, and see them as a natural ally against foreign influence, and are willing to co-operate to a degree"
 IRE_ira_3: "Appeased IRA"
 IRE_ira_3_desc: "Though Ireland fought as one for its independence during the revolution of 1919-21, the signing of peace in the 1921 Anglo-Irish Treaty precipitated disasterous effects on the young nation, with its politicians and armed forces splitting into pro- and anti-treaty camps during the Irish Civil War of 1922-23. Following the conditional victory of the pro-treaty forces, groups of irregulars vowed to continue the fight until all vestiges of British Influence were removed from the whole of Ireland. Taking the name of the Irish Republican Army, they stand as a completely seperate unit to the National Army, and act beyond govenement control. Keeping a check on the IRA is thus a keen interest of the Dublin govenment, lest the irregulars start another war, or worse, turn against the Irish Government. \n\n the IRA currently have no issue with the Dublin Government, but equally do not seek any form of co-operation, maintaining their independence and keeping the state at arms-reach"
 IRE_ira_4: "Disloyal IRA"
 IRE_ira_4_desc: "Though Ireland fought as one for its independence during the revolution of 1919-21, the signing of peace in the 1921 Anglo-Irish Treaty precipitated disasterous effects on the young nation, with its politicians and armed forces splitting into pro- and anti-treaty camps during the Irish Civil War of 1922-23. Following the conditional victory of the pro-treaty forces, groups of irregulars vowed to continue the fight until all vestiges of British Influence were removed from the whole of Ireland. Taking the name of the Irish Republican Army, they stand as a completely seperate unit to the National Army, and act beyond govenement control. Keeping a check on the IRA is thus a keen interest of the Dublin govenment, lest the irregulars start another war, or worse, turn against the Irish Government. \n\n the IRA have grown suspicious of the Dublin Government, feeling that progress towards the establishment of an independent republic is moving too slow. They have now begun to openly speak out against the Government, and may be starting to organise a resistance"
 IRE_ira_5: "Hostile IRA"
 IRE_ira_5_desc: "Though Ireland fought as one for its independence during the revolution of 1919-21, the signing of peace in the 1921 Anglo-Irish Treaty precipitated disasterous effects on the young nation, with its politicians and armed forces splitting into pro- and anti-treaty camps during the Irish Civil War of 1922-23. Following the conditional victory of the pro-treaty forces, groups of irregulars vowed to continue the fight until all vestiges of British Influence were removed from the whole of Ireland. Taking the name of the Irish Republican Army, they stand as a completely seperate unit to the National Army, and act beyond govenement control. Keeping a check on the IRA is thus a keen interest of the Dublin govenment, lest the irregulars start another war, or worse, turn against the Irish Government. \n\n the IRA now consider the Dublin Govenment as much of an enemy as the British occupying Belfast. They have begun openly planning operations against the Irish state and may even move to reignite the Civil War"
 IRE_ira_6: "Defeated IRA"
 IRE_ira_6_desc: "The IRA, who have been a constant source of concern for the legitimate Irish govenment, and hostility towards the British and Ulster unionists, have finally been defeated. Though it was certainly not without cost, [IRE.GetnameDef] has finally succeeded in reuniting the Irish Armed Forces, and put an end to the deep wounds of the Civil War for good."
 IRE_rural_conscription: "Rural Conscription"
 IRE_revising_the_constitution: "Revising the Constitution"
 IRE_legacy_of_revolution: "Legacy of Revolution"
 IRE_legacy_of_revolution_desc: "The impetus and patriotic feelings of the Easter Rising and the War for Independence is lost upon the decadent statesmen of Dublin. They have proven that they lack the will needed to form a truely independent Republic of Ireland, so instead we must turn to the IRA and the political fringe"
 IRE_civ_factory_bonus: "Preparing Industrial Growth"
 IRE_mil_factory_bonus: "Kickstarting the Arms Industry"
 IRE_plan_w_idea: "Plan W"
 IRE_plan_w_idea_desc: "A joint Anglo-Irish plan of defence keeps our forces prepared in the case of a German invasion of Ireland"
 IRE_irish_brigade: "The Irish Brigade"
 IRE_catholic_state: "A Catholic State"
 IRE_catholic_state_desc: "The special position of the Catholic Church has been entrenched within the Constitution of the Irish Republic"
 IRE_defend_the_republic: "Defence of the Republic"
 IRE_defend_the_republic_desc: "With the hard-fought republic finally won from the clutches of the British, we will not surrender our newfound independence easily."
 IRE_invested_in_james_mackie_sons: "Has Invested in James Mackie & Sons"
 IRE_invested_in_HnW: "Has Invested in Harland & Wolff"
 IRE_invested_in_workman_clark_company: "Has Invested in Workman, Clark & Co."
 IRE_legacy_of_revolution_idea: "Legacy of the Revolutiion"
 IRE_legacy_of_revolution_idea_desc: "Dublin politicians have proven too weak and cautious to seize the opportunity to create a free Ireland. The people now must take the fate of the nation into their own hands"
 IRE_blueshirts: "Political Paramilitaries"
 IRE_blueshirts_desc: "The Greenshirts of the Corporate Party, and the newly reformed Blueshirts of the Old Army Comrades Association serve as an additional military and political arm of the state, similar to Mussolini's Blackshirts and Hitler's Blueshirts"
 IRE_rural_militias: "Rural Militias"
 IRE_rural_militias_desc: "Echoing the spirit of the Easter Rising, even civilians of rural Ireland are expected to bear the torch for the nation."
 IRE_IEAA_INDUSTRY: "IEAA Annual Focus: Industrialisation"
 IRE_IEAA_RND: "IEAA Annual Focus: Research and Development"
 IRE_IEAA_WR: "IEAA Annual Focus: Efficiency & Production Techniques"
 IRE_IEAA_ELEC: "IEAA Annual Focus: Electronics"
 IRE_death_before_surrender: "Death before surrender"
 IRE_death_before_surrender_desc: "The fate of Ireland hangs in the balance. With 700 years of resistance to British occupation behind them, both sides in the renewed Irish Civil War will not surrender their vision for Ireland's future easily."
 IRE_ultracatholic_state: "A Catholic State"
 IRE_ultracatholic_state_desc: "The establishment of Corporate Party rule in Ireland has enshrined the orthodoxy of the Irish Catholic faith into the very fabric of the nation. Central to the history of resistance to the British, the Catholic church now occupies a place of prominence within the national spirit and ethos."
