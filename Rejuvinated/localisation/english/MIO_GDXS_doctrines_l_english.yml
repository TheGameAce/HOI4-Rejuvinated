 SUBDOCTRINE_depth_penetration_DESC: "Our soldiers must be capable of enduring arduous missions where they face attacks from multiple fronts, engage in multi-pronged operations, and operate in isolated conditions. By leveraging deep-penetration tactics, we will seize key positions within enemy territory, fragment their formations, and disrupt their deployments. This approach enables us to overcome superior forces and achieve the encirclement and annihilation of the enemy."
