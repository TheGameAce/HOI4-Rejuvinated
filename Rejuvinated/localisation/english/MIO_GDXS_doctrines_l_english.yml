 #微操大师
 SUBDOCTRINE_Micro_master: "Micro-Control Master"
 SUBDOCTRINE_Micro_master_DESC: "The entire staff is a bunch of useless jerks! Don't try to stop me—I'm about to start micromanaging!"
 Micro_master_Micro_master_DESC_A: "Seizing command authority"
 Micro_master_Micro_master_DESC_B: "In any case, the combined forces stand at eight hundred thousand against six hundred thousand—the advantage is ours!"
 Micro_master_Micro_master_DESC_C: "Move the machine gun five meters to the left."
 Micro_master_Micro_master_DESC_D: "I don't understand why everyone keeps talking about Xiang Yu being trapped at Gaixia, as if this ancient battlefield in the Central Plains has sealed our fate with more doom than fortune."
 Micro_master_Micro_master_DESC_E: "Restore Authority to the General Staff Department"
 Micro_master_DESC_E_A: "§RBoss makes a galaxy-brain take.§!"
