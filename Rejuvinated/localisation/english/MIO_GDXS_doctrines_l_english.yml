 SUBDOCTRINE_Behind_enemy_lines: "Behind enemy lines"
 SUBDOCTRINE_Behind_enemy_lines_DESC: "Establish a second front behind enemy lines to tie down the enemy through harassment, sabotage, and asymmetric warfare."
