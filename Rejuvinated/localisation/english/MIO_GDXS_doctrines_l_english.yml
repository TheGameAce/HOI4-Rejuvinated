 SUBDOCTRINE_On_Proteacted_War: "On Proteacted War"
 SUBDOCTRINE_On_Proteacted_War_DESC: "Three conditions are necessary for the complete destruction of Japanese imperialism: First, the formation of a united front against Japanese aggression within China; second, the formation of an international united front against Japanese aggression; third, the rise of revolutionary movements among the people of Japan and its colonies. From the standpoint of the Chinese people, the great unity of the Chinese people is the primary condition among these three.——Mao Zedong《On Prolonged War》"
 On_Proteacted_War_On_Proteacted_War_DESC_A: "Behind enemy lines"
 On_Proteacted_War_On_Proteacted_War_DESC_B: "Behind-enemy-lines propaganda"
 On_Proteacted_War_On_Proteacted_War_DESC_C: "Reclaim the homeland"
 On_Proteacted_War_On_Proteacted_War_DESC_D: "Partisan Forces in Occupied Territories"
 On_Proteacted_War_On_Proteacted_War_DESC_E: "Avenge the national humiliation of a century"
 #总玉碎
 SUBDOCTRINE_Total_Gyokusai: "Total Gyokusai"
 SUBDOCTRINE_Total_Gyokusai_DESC: "I bear no fault whatsoever. Not in the past, not now, nor ever! —Tokyo Trials The people have never possessed free will. Their sole purpose is to die for the nation in battle. Should the regime cease to exist, the people ought to perish alongside it."
 ABILITY_Total_Gyokusai_A: "Unlocking Capabilities:§YGyokusai§!\n§YGyokusai§!:You can now launch a forced attack at 20% of the cost."
 ABILITY_Total_Gyokusai_B: "§YForced Offense§!,§YA desperate battle§!Will be removed"
