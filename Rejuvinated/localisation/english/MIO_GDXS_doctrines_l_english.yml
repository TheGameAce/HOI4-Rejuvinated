 #意识形态优先
 GRAND_Ideology_first: "Ideology first"
 GRAND_Ideology_first_DESC: "Military affairs are an extension of politics; ideology is the weaponry of politics. Everything serves the purpose of politics. Whoever controls the past controls the future; whoever controls the present controls the past. "
 #非对称作战
 GRAND_mio_asymmetric_warfare: "asymmetric warfare"
 GRAND_mio_asymmetric_warfare_DESC: "The disparity in troop numbers between our forces and the enemy is stark, and the gap in weapon quality is glaring. We must engage in unconventional tactics and asymmetric warfare to overcome superior forces with inferior ones."
 #优中选优
