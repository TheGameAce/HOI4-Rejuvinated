 SUBDOCTRINE_Sports_Tactics_DESC: "Leveraging a larger operational space to gain time for troop movements and encircle the enemy, then swiftly defeating them with superior forces.\n The famous “Four Crossings of the Chishui River” campaign employed precisely this tactic."
