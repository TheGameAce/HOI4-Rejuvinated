l_english:
#focus_l_english
 USA_support_rock_island: "Rock Island Arsenal"
 USA_support_rock_island_desc: "With war looming, Rock Island Arsenal will once again fulfill core military industrial needs, ramping up production. While artillery is a specialization for the arsenal, they'll act as a hub, producing a wide variety of war materials."
 USA_strategic_bombing: "Bomber Development"
 USA_strategic_bombing_desc: "The modern age of aircraft in warfare has produced a great number of new possibilities. One such possibility is the utilization of large planes carrying impressive payloads, capable of destruction on a large scale. Such a tactic could bring an enemy to their knees, crippling their industrial infrastructure!"
 USA_escort_effort: "The Invisible Threat"
 USA_escort_effort_desc: "Submarines constitute a great danger to our merchant convoys, threatening our operations overseas. Our current escort fleet is severely undersized & out of date. It should be a high priority for us to modernize said fleet!"
 USA_amphibious_operations: "Fleet Landing Exercises"
 USA_democratic_socialism: "The Socialist States of America"
 USA_democratic_socialism_desc: "No right-thinking person can deny that socialism is the future of human civilization. At the same time, no proud and patriotic citizen of this republic could possibly support a system where government is no longer made by the people and of the people. We must rebuild our government under the principles of Marxism-Leninism to achieve such a goal!"
 USA_liberty_for_the_philippines: "Socialism for the Philippines"
 USA_liberty_for_the_philippines_desc: "The people of the Philippines also deserve the benefits we now experience through our American socialistic system!"
 USA_pacific_decolonisation: "Pacific 'Decolonization'"
 USA_pacific_decolonisation_desc: "There is no justification - none - for the continued presence of European powers in the Pacific! Thusly, it becomes our duty to liberate & safeguard these former colonial territories. It's only pure coincidence that it happens to also give us a foothold in the region..."
 USA_reach_out_to_the_ware_group_desc: "There exists a small group of devoted communists inside our government. They believed that they operated in secret, but we knew their names all along. Now that our government is under new leadership, perhaps they could be persuaded to take on more official roles."
 USA_us_ussr_economic_cooperation: "Research Cooperation"
 USA_us_ussr_economic_cooperation_desc: "Our allies have made some impressive industrial advances of their own, just as we ourselves have. It would be mutually beneficial to our countries to share our advancements, leading to an even greater leap in technological progress!"
 USA_secure_china: "The Sino-American Alliance"
 USA_empower_the_huac: "Empower the HUAC"
 USA_empower_the_huac_desc: "The House Committee on Unamerican Activities serves an important function in our healthy democracy. We must not allow subversive elements to influence our political process!"
 USA_privatize_the_TVA: "The TVA Model"
 USA_privatize_the_TVA_desc: "The Tennessee Valley Authority is a federal program that was designed to help the impoverished Tennessee Valley region to modernize & improve, through means such as new infrastructure & electrification. We can take this same model & apply it at a national scale, bringing the same improvements to the rest of the population!"
 USA_maritime_commission: "Merchant Marine Act"
 USA_maritime_commission_desc: "While most laymen only focus on the warships, the true experts know that it is the humble cargo vessel that wins wars. To increase the amount of shipping available in times of war, we will form a special board to coordinate construction - the U.S. Maritime Commission."
 uk_extra_tech_slot: "Direct Funding to Cambridge"
 uk_extra_tech_slot_desc: "Cambridge is one of our oldest & most accomplished universities! Directing some additional funding to them helps us by way of their research programs, which will be especially vital if war breaks out."
 uk_convoy_focus: "The Convoy System"
