 #National Spirits
 rj_aggressive_italian_pressure:0 "Aggressive Italian Pressure"
 rj_aggressive_italian_pressure_desc:0 "Albania formed a close bond with Italy in the 30s during times of econimic hardship. Italy has taken advantage of the affair by aqcuiring several positions of military importance and infiltrating our politics."
 rj_political_opposition:0 "Enemies Everywhere"
 rj_political_opposition_desc:0 "As Zog claimed more and more power for himself, he has made numerous political and personal enemies. Due to the long standing Albanian tradition of blood vengence, many of these rivals are actively plotting to take his life."
 rj_disarmed_tribes:0 "Disarmed Tribes"
 rj_disarmed_tribes_desc:0 "As a measure of state security, tribes and families that oppose the rule of King Zog have been forcefully disarmed."
 rj_balkan_immigration:0 "Balkan Immigration"
 rj_italian_dockyard_investments:0 "Italian Dockyard Investments"
 rj_italian_dockyard_investments_desc:0 "As a last ditch effort to woo the Albanians into the Italianization of their government and economy, Mussolini sent a money gift to the government to assist with dockyard programs across the country."
 
